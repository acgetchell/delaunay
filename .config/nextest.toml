# nextest configuration for delaunay
# See: https://nexte.st/book/configuration.html

[profile.default]
# Run tests in parallel by default
test-threads = "num-cpus"

# Show test output for failures
failure-output = "immediate-final"
success-output = "never"

# Continue running tests after first failure
fail-fast = false

# Retry flaky tests (useful for proptests)
retries = 0

# Default-suite tests should stay under the 10-second per-test budget. Longer
# deterministic correctness tests belong behind the slow-tests feature.
slow-timeout = { period = "10s", terminate-after = 1 }

[profile.ci]
# CI profile: optimized for GitHub Actions
# Inherits from default profile

# Show more verbose output in CI
failure-output = "immediate-final"
success-output = "never"

# Continue running all tests even if some fail
fail-fast = false

# Retry flaky tests once in CI (helps with proptests and timing-sensitive tests)
retries = 1

# Enforce the default-suite 10-second per-test budget in CI.
slow-timeout = { period = "10s", terminate-after = 1 }

# JUnit report configuration
[profile.ci.junit]
# Store reports in test-results directory (matches workflow)
path = "test-results/junit.xml"

# Store test output in JUnit report
store-success-output = false
store-failure-output = true

[profile.coverage]
# Coverage runs execute LLVM-instrumented binaries in parallel, so exact
# predicate regressions need more headroom than the normal CI profile while
# still failing genuine hangs.
failure-output = "immediate-final"
success-output = "never"
fail-fast = false
retries = 0
slow-timeout = { period = "300s", terminate-after = 1 }

[profile.coverage.junit]
path = "test-results/junit.xml"
store-success-output = false
store-failure-output = true

[profile.slow]
# Slow correctness and regression tests are intentionally outside the default
# 10-second per-test budget. Keep a finite watchdog so hangs still fail.
failure-output = "immediate-final"
success-output = "never"
fail-fast = false
retries = 0
slow-timeout = { period = "900s", terminate-after = 1 }
