---
# Repository-owned Semgrep rules.
#
# Keep this file small and project-specific. Broad default/community rules have
# been noisy for this Rust library and duplicate CodeQL, cargo-audit, Clippy,
# Ruff, and ShellCheck coverage.
#
# These rules encode repository-specific Rust invariants. Keep them focused so
# local and CodeRabbit Semgrep runs stay low-noise.

rules:
  - id: delaunay.rust.no-stdio-diagnostics-in-src
    languages:
      - rust
    severity: WARNING
    message: "Use tracing macros for production diagnostics instead of stdout/stderr macros."
    metadata:
      category: maintainability
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/338"
      rationale: "Runtime diagnostics should be filterable through tracing and RUST_LOG."
    paths:
      include:
        - "/src/**/*.rs"
      exclude:
        - "/tests/**"
        - "/examples/**"
        - "/benches/**"
    patterns:
      - pattern-either:
          - pattern: println!(...)
          - pattern: eprintln!(...)
      - pattern-not-inside: |
          mod tests {
              ...
          }
      - pattern-not-inside: |
          #[cfg(test)]
          mod $MOD {
              ...
          }
      - pattern-not-inside: |
          #[cfg(any(test, ...))]
          mod $MOD {
              ...
          }
      - pattern-not-inside: |
          #[cfg(test)]
          fn $FUNC(...) {
              ...
          }
      - pattern-not-inside: |
          #[cfg(any(test, ...))]
          fn $FUNC(...) {
              ...
          }
      - pattern-not-inside: |
          #[cfg(test)]
          impl $TYPE {
              ...
          }
      - pattern-not-inside: |
          #[cfg(any(test, ...))]
          impl $TYPE {
              ...
          }

  - id: delaunay.rust.no-nonfinite-unwrap-defaults
    languages:
      - rust
    severity: WARNING
    message: "Do not hide failed floating-point conversion with NaN or infinity defaults."
    metadata:
      category: correctness
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/338"
      rationale: >-
        Geometric predicates and diagnostics should not synthesize non-finite
        sentinels after conversion failure.
    paths:
      include:
        - "/src/**/*.rs"
    pattern-either:
      - pattern: $VALUE.unwrap_or(f64::NAN)
      - pattern: $VALUE.unwrap_or(f64::INFINITY)
      - pattern: $VALUE.unwrap_or(f64::NEG_INFINITY)
      - pattern: $VALUE.unwrap_or(std::f64::NAN)
      - pattern: $VALUE.unwrap_or(std::f64::INFINITY)
      - pattern: $VALUE.unwrap_or(std::f64::NEG_INFINITY)
      - pattern: $VALUE.unwrap_or_else(|| f64::NAN)
      - pattern: $VALUE.unwrap_or_else(|| f64::INFINITY)
      - pattern: $VALUE.unwrap_or_else(|| f64::NEG_INFINITY)
      - pattern: $VALUE.unwrap_or_else(|| std::f64::NAN)
      - pattern: $VALUE.unwrap_or_else(|| std::f64::INFINITY)
      - pattern: $VALUE.unwrap_or_else(|| std::f64::NEG_INFINITY)

  - id: delaunay.rust.no-std-hash-collections-in-hot-src
    languages:
      - rust
    severity: WARNING
    message: "Use crate FastHashMap/FastHashSet aliases in hot source paths instead of std hash collections."
    metadata:
      category: performance
      rationale: >-
        Performance-sensitive topology and geometry paths should use the
        repository's optimized hash aliases unless a local exception is
        documented outside these paths.
    paths:
      include:
        - "/src/core/algorithms/**/*.rs"
        - "/src/core/collections/**/*.rs"
        - "/src/core/tds.rs"
        - "/src/core/triangulation.rs"
        - "/src/geometry/algorithms/**/*.rs"
        - "/src/delaunay/**/*.rs"
    patterns:
      - pattern-either:
          - pattern: use std::collections::HashMap;
          - pattern: use std::collections::HashSet;
          - pattern-regex: '^\s*use\s+std::collections::\{[^;\n]*\bHashMap\b[^;\n]*\};'
          - pattern-regex: '^\s*use\s+std::collections::\{[^;\n]*\bHashSet\b[^;\n]*\};'
          - pattern: std::collections::HashMap::new()
          - pattern: std::collections::HashSet::new()
          - pattern: std::collections::HashMap::default()
          - pattern: std::collections::HashSet::default()
          - pattern: std::collections::HashMap::with_capacity(...)
          - pattern: std::collections::HashSet::with_capacity(...)
          - pattern: std::collections::HashMap::with_hasher(...)
          - pattern: std::collections::HashSet::with_hasher(...)
          - pattern: std::collections::HashMap::with_capacity_and_hasher(...)
          - pattern: std::collections::HashSet::with_capacity_and_hasher(...)
          - pattern: std::collections::HashMap::<$KEY, $VALUE>::new()
          - pattern: std::collections::HashSet::<$VALUE>::new()
          - pattern: std::collections::HashMap::<$KEY, $VALUE>::default()
          - pattern: std::collections::HashSet::<$VALUE>::default()
          - pattern: std::collections::HashMap::<$KEY, $VALUE>::with_capacity(...)
          - pattern: std::collections::HashSet::<$VALUE>::with_capacity(...)
          - pattern: std::collections::HashMap::<$KEY, $VALUE>::with_hasher(...)
          - pattern: std::collections::HashSet::<$VALUE>::with_hasher(...)
          - pattern: std::collections::HashMap::<$KEY, $VALUE>::with_capacity_and_hasher(...)
          - pattern: std::collections::HashSet::<$VALUE>::with_capacity_and_hasher(...)
          - pattern: "let $NAME: std::collections::HashMap<$KEY, $VALUE> = $INIT;"
          - pattern: "let $NAME: std::collections::HashSet<$VALUE> = $INIT;"
          - pattern: "type $NAME = std::collections::HashMap<$KEY, $VALUE>;"
          - pattern: "type $NAME = std::collections::HashSet<$VALUE>;"
          - pattern: "fn $FUNC(...) -> std::collections::HashMap<$KEY, $VALUE> { ... }"
          - pattern: "fn $FUNC(...) -> std::collections::HashSet<$VALUE> { ... }"
          - pattern: "fn $FUNC(...) -> std::collections::HashMap<$KEY, $VALUE>;"
          - pattern: "fn $FUNC(...) -> std::collections::HashSet<$VALUE>;"
          - pattern: $ITER.collect::<std::collections::HashMap<$KEY, $VALUE>>()
          - pattern: $ITER.collect::<std::collections::HashSet<$VALUE>>()
      - pattern-not-inside: |
          mod tests {
              ...
          }

  - id: delaunay.rust.prefer-simplex-key-buffer-for-local-frontiers
    languages:
      - generic
    severity: WARNING
    message: >-
      Raw Vec<SimplexKey> used for a local repair/topology frontier. Prefer
      SimplexKeyBuffer unless this is an unbounded full-TDS snapshot, public
      error payload, serialization boundary, or other intentionally heap-backed
      collection.
    metadata:
      category: performance
      rationale: >-
        Local repair, mutation, and diagnostic frontiers are usually small and
        should use the repository's semantic stack-backed buffer alias. Full
        triangulation snapshots and public error payloads should remain Vec.
    paths:
      include:
        - "/src/**/*.rs"
        - "/tests/semgrep/src/project_rules/**/*.rs"
    pattern-regex: >-
      \b(?:(?:(?:pending|repair|seed|soft_fail|touched|affected|frontier|sample)_[A-Za-z0-9_]*|conflict_preview|(?:new|removed)_simplices)\s*:\s*(?:&\s*mut\s*)?Vec\s*<\s*SimplexKey\s*>|let\s+(?:mut\s+)?(?:(?:pending|repair|seed|soft_fail|touched|affected|frontier|sample)_[A-Za-z0-9_]*|conflict_preview|(?:new|removed)_simplices)\s*=\s*Vec\s*::\s*(?:(?:<\s*SimplexKey\s*>\s*::\s*)?)(?:new|with_capacity)\s*\()

  - id: delaunay.rust.no-silent-conversion-fallbacks
    languages:
      - rust
    severity: WARNING
    message: "Handle numeric conversion failures explicitly instead of hiding them behind unwrap_or fallbacks."
    metadata:
      category: correctness
      rationale: >-
        Geometry and topology code should preserve conversion failure context
        or choose an explicit fallback branch rather than silently substituting
        sentinel values.
    paths:
      include:
        - "/src/core/**/*.rs"
        - "/tests/semgrep/src/core/**/*.rs"
        - "/src/geometry/**/*.rs"
        - "/src/topology/**/*.rs"
        - "/src/delaunay/**/*.rs"
        - "/src/project_rules/**/*.rs"
    patterns:
      - pattern-either:
          - pattern: NumCast::from($VALUE).unwrap_or($FALLBACK)
          - pattern: NumCast::from($VALUE).unwrap_or_else($FALLBACK)
          - pattern: num_traits::NumCast::from($VALUE).unwrap_or($FALLBACK)
          - pattern: num_traits::NumCast::from($VALUE).unwrap_or_else($FALLBACK)
          - pattern: cast::<$FROM, $TO>($VALUE).unwrap_or($FALLBACK)
          - pattern: cast::<$FROM, $TO>($VALUE).unwrap_or_else($FALLBACK)
          - pattern: num_traits::cast::<$FROM, $TO>($VALUE).unwrap_or($FALLBACK)
          - pattern: num_traits::cast::<$FROM, $TO>($VALUE).unwrap_or_else($FALLBACK)
          - patterns:
              - pattern: $SAFE(...).unwrap_or($FALLBACK)
              - metavariable-regex:
                  metavariable: $SAFE
                  regex: safe_[A-Za-z0-9_]+
      - pattern-not-inside: |
          mod tests {
              ...
          }

  - id: delaunay.rust.no-silent-conversion-fallbacks-in-public-samples
    languages:
      - rust
    severity: WARNING
    message: >-
      Handle numeric conversion failures explicitly in public samples instead of
      hiding them behind unwrap_or fallbacks.
    metadata:
      category: correctness
      rationale: >-
        Examples, benchmarks, and public API tests are copied by users. They
        should model explicit conversion-failure handling instead of silently
        substituting sentinel values.
    paths:
      include:
        - "/examples/**/*.rs"
        - "/benches/**/*.rs"
        - "/tests/allocation_api.rs"
        - "/tests/delaunay_public_api_coverage.rs"
        - "/tests/prelude_exports.rs"
        - "/tests/public_*.rs"
        - "/src/project_rules/**/*.rs"
      exclude:
        - "/tests/semgrep/**"
    patterns:
      - pattern-either:
          - pattern: NumCast::from($VALUE).unwrap_or($FALLBACK)
          - pattern: NumCast::from($VALUE).unwrap_or_else($FALLBACK)
          - pattern: num_traits::NumCast::from($VALUE).unwrap_or($FALLBACK)
          - pattern: num_traits::NumCast::from($VALUE).unwrap_or_else($FALLBACK)
          - pattern: cast::<$FROM, $TO>($VALUE).unwrap_or($FALLBACK)
          - pattern: cast::<$FROM, $TO>($VALUE).unwrap_or_else($FALLBACK)
          - pattern: num_traits::cast::<$FROM, $TO>($VALUE).unwrap_or($FALLBACK)
          - pattern: num_traits::cast::<$FROM, $TO>($VALUE).unwrap_or_else($FALLBACK)
          - patterns:
              - pattern: $SAFE(...).unwrap_or($FALLBACK)
              - metavariable-regex:
                  metavariable: $SAFE
                  regex: safe_[A-Za-z0-9_]+

  - id: delaunay.rust.no-partial-cmp-ordering-defaults
    languages:
      - rust
    severity: WARNING
    message: "Handle incomparable partial_cmp results explicitly instead of defaulting to an Ordering."
    metadata:
      category: correctness
      rationale: >-
        Geometry ordering code should document the impossible/incomparable
        branch instead of silently folding it into Equal, Less, or Greater.
    paths:
      include:
        - "/src/**/*.rs"
    patterns:
      - pattern-either:
          - pattern: $LEFT.partial_cmp($RIGHT).unwrap_or(Ordering::$ORDER)
          - pattern: $LEFT.partial_cmp($RIGHT).unwrap_or(std::cmp::Ordering::$ORDER)
          - pattern: $LEFT.partial_cmp($RIGHT).unwrap_or_else($FALLBACK)
      - pattern-not-inside: |
          mod tests {
              ...
          }

  - id: delaunay.rust.no-function-local-use-in-src
    languages:
      - rust
    severity: WARNING
    message: "Move source imports to module scope instead of declaring use items inside functions."
    metadata:
      category: maintainability
      rationale: >-
        Function-local imports obscure dependency shape and make it easier for
        examples, tests, and production code to drift into different styles.
    paths:
      include:
        - "/src/**/*.rs"
    patterns:
      - pattern: use $PATH;
      - pattern-inside: |
          fn $FUNC(...) {
              ...
          }
      - pattern-not-inside: |
          mod tests {
              ...
          }
      - pattern-not-inside: |
          #[cfg(test)]
          mod $MOD {
              ...
          }
      - pattern-not-inside: |
          #[cfg(any(test, ...))]
          mod $MOD {
              ...
          }

  - id: delaunay.rust.no-deep-crate-paths-in-functions
    languages:
      - rust
    severity: WARNING
    message: "Import long crate paths at module scope instead of spelling deep crate:: paths inside function bodies."
    metadata:
      category: maintainability
      rationale: >-
        Deep function-body paths make control flow harder to scan and often
        indicate a missing focused import or overly coupled helper.
    paths:
      include:
        - "/src/core/**/*.rs"
        - "/src/geometry/**/*.rs"
        - "/src/topology/**/*.rs"
        - "/src/delaunay/**/*.rs"
    patterns:
      - pattern-regex: '\bcrate::(?:core|delaunay|geometry|topology)::[A-Za-z0-9_]+(?:::[A-Za-z0-9_]+){1,}\b'
      - pattern-inside: |
          fn $FUNC(...) {
              ...
          }
      - pattern-not-regex: '^\s*(//|///|/\*|\*)'
      - pattern-not-inside: |
          mod tests {
              ...
          }
      - pattern-not-inside: |
          #[cfg(test)]
          mod $MOD {
              ...
          }
      - pattern-not-inside: |
          #[cfg(any(test, ...))]
          mod $MOD {
              ...
          }

  - id: delaunay.rust.no-production-unwrap-panic
    languages:
      - rust
    severity: WARNING
    message: "Avoid unwrap/panic in non-test source; return typed errors or document an internal invariant."
    metadata:
      category: correctness
      rationale: "Public library paths should fail explicitly rather than panicking on user input."
    paths:
      include:
        - "/src/**/*.rs"
    patterns:
      - pattern-either:
          - pattern: $VALUE.unwrap()
          - pattern: panic!(...)
          - pattern: std::panic!(...)
          - pattern: core::panic!(...)
          - patterns:
              - pattern: $VALUE.expect($MESSAGE)
              - metavariable-regex:
                  metavariable: $MESSAGE
                  regex: >-
                    "(point was set before building vertex|Failed to build
                    vertex.*|public APIs should return typed errors instead)"
      - pattern-not-inside: |
          mod tests {
              ...
          }

  - id: delaunay.rust.no-production-debug-assert
    languages:
      - rust
    severity: WARNING
    message: "Avoid debug_assert! in production source; encode invariants in types or return typed errors."
    metadata:
      category: correctness
      rationale: >-
        Debug-only assertions disappear in release builds, so they cannot be
        parse-don't-validate boundaries for library invariants.
    paths:
      include:
        - "/src/**/*.rs"
    patterns:
      - pattern-either:
          - pattern: debug_assert!(...)
          - pattern: std::debug_assert!(...)
          - pattern: core::debug_assert!(...)
          - pattern: debug_assert_eq!(...)
          - pattern: std::debug_assert_eq!(...)
          - pattern: core::debug_assert_eq!(...)
          - pattern: debug_assert_ne!(...)
          - pattern: std::debug_assert_ne!(...)
          - pattern: core::debug_assert_ne!(...)
      - pattern-not-inside: |
          mod tests {
              ...
          }
      - pattern-not-inside: |
          #[cfg(test)]
          mod $MOD {
              ...
          }
      - pattern-not-inside: |
          #[cfg(any(test, ...))]
          mod $MOD {
              ...
          }

  - id: delaunay.rust.no-public-surface-unwrap-panic
    languages:
      - rust
    severity: WARNING
    message: >-
      Use typed Result handling in public examples, benchmarks, and public API
      tests instead of unwrap/expect/panic.
    metadata:
      category: correctness
      rationale: >-
        User-facing examples, benchmarks, and public API tests are copied as
        usage patterns. They should preserve typed error information instead
        of erasing failures behind unwrap, expect, or panic.
    paths:
      include:
        - "/examples/**/*.rs"
        - "/benches/**/*.rs"
        - "/tests/allocation_api.rs"
        - "/tests/delaunay_public_api_coverage.rs"
        - "/tests/prelude_exports.rs"
        - "/tests/public_*.rs"
        - "/tests/semgrep/src/project_rules/**/*.rs"
    pattern-either:
      - pattern: $VALUE.unwrap()
      - pattern: $VALUE.expect(...)
      - pattern: panic!(...)

  - id: delaunay.rust.no-legacy-coordinate-generic-api
    languages:
      - generic
    severity: WARNING
    message: "Use the current f64-coordinate API: Point<D>, Vertex<U, D>, Tds<U, V, D>, ConvexHull<U, V, D>, and Point::try_new/try_from."
    metadata:
      category: maintainability
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/442"
      rationale: >-
        Coordinate storage is now finite f64 by construction. The coordinate
        scalar is no longer a public type parameter on Point, Vertex, Tds, or
        related builders, and raw point construction must parse through the
        fallible boundary.
    paths:
      include:
        - "/src/**/*.rs"
        - "/tests/**/*.rs"
        - "/benches/**/*.rs"
        - "/examples/**/*.rs"
        - "/docs/**/*.md"
        - "/README.md"
      exclude:
        - "/docs/archive/**"
    pattern-regex: >-
      \b(?:Point\s*<\s*(?:T|f64|K::Scalar|[A-Za-z_][A-Za-z0-9_]*::Scalar)\s*,|Vertex\s*<\s*(?:T|f64|K::Scalar|[A-Za-z_][A-Za-z0-9_]*::Scalar)\s*,[^>\n,]+,\s*[^>\n]+>|VertexBuilder\s*::\s*<\s*(?:T|f64|K::Scalar|[A-Za-z_][A-Za-z0-9_]*::Scalar)\s*,|Tds\s*<\s*(?:T|f64|K::Scalar|[A-Za-z_][A-Za-z0-9_]*::Scalar)\s*,|Simplex\s*<\s*(?:T|f64|K::Scalar|[A-Za-z_][A-Za-z0-9_]*::Scalar)\s*,|DelaunayTriangulationBuilder\s*<\s*(?:'[^,]+,\s*)?(?:T|f64|K::Scalar|[A-Za-z_][A-Za-z0-9_]*::Scalar)\s*,|ConvexHull\s*<\s*(?:_|T|f64|K|K::Scalar|FastKernel\s*<[^>\n]+>|AdaptiveKernel\s*<[^>\n]+>|[A-Za-z_][A-Za-z0-9_]*::Scalar)\s*,[^>\n,]+,\s*[^>\n,]+,\s*[^>\n]+>|ConvexHull(?:2D|3D|4D)\s*<\s*(?:_|T|f64|K|K::Scalar|FastKernel\s*<[^>\n]+>|AdaptiveKernel\s*<[^>\n]+>|[A-Za-z_][A-Za-z0-9_]*::Scalar)\s*,|Point::new\s*\()

  - id: delaunay.rust.no-raw-point-coordinate-storage
    languages:
      - generic
    severity: WARNING
    message: "Point must store validated coordinate domain state, not a raw [f64; D] array."
    metadata:
      category: correctness
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/442"
      rationale: >-
        Raw f64 storage discards the finite-coordinate proof and risks regressing
        the Eq/Hash/Ord semantics for signed zero and other floating-point edge
        cases. Keep raw f64 at parse/serialization boundaries and store a
        validated coordinate wrapper inside Point.
    paths:
      include:
        - "/src/geometry/point.rs"
        - "/tests/semgrep/src/project_rules/**/*.rs"
    pattern-regex: >-
      (?s)\bstruct\s+Point\s*<[^>{}]*>\s*\{[^}]*\bcoords\s*:\s*\[\s*f64\s*;\s*D\s*\]

  - id: delaunay.rust.no-coordinate-scalar-trait
    languages:
      - generic
    severity: WARNING
    message: "Do not reintroduce CoordinateScalar; keep coordinate invariants on validated coordinate/domain types."
    metadata:
      category: correctness
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/442"
      rationale: >-
        CoordinateScalar made arbitrary numeric support look available while
        the crate's storage, predicates, and topology model support validated
        f64 coordinates. Future exact or alternate coordinate models should be
        explicit invariant-bearing types, not a loose scalar trait.
    paths:
      include:
        - "/src/**/*.rs"
        - "/tests/**/*.rs"
        - "/benches/**/*.rs"
        - "/examples/**/*.rs"
        - "/docs/code_organization.md"
        - "/README.md"
    pattern-regex: '\bCoordinateScalar\b'

  - id: delaunay.rust.no-vertex-empty-constructor
    languages:
      - generic
    severity: WARNING
    message: "Use Vertex::try_new or Vertex::try_new_with_data; do not construct placeholder vertices with invalid UUIDs."
    metadata:
      category: correctness
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/442"
      rationale: >-
        Vertex::empty produced a storable invalid vertex with a nil UUID. Invalid
        UUIDs should be rejected at construction boundaries rather than stored
        and discovered by later validation.
    paths:
      include:
        - "/src/**/*.rs"
        - "/tests/**/*.rs"
        - "/benches/**/*.rs"
        - "/examples/**/*.rs"
      exclude:
        - "/tests/semgrep/**"
    pattern-regex: '\bVertex\s*(?:::<[^>\n]+>)?\s*::\s*empty\s*\('

  - id: delaunay.rust.no-infallible-fallible-triangulation-constructors
    languages:
      - generic
    severity: WARNING
    message: "Use try_new*/try_with_* for fallible triangulation construction and ConvexHull::try_from_triangulation for fallible hull snapshots."
    metadata:
      category: correctness
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/459"
      rationale: >-
        Batch Delaunay construction and hull snapshot construction parse raw
        invariant-bearing topology and geometry. Public names must expose that
        fallibility with `try_new*`, `try_with_*`, or `try_from_*`. Empty
        triangulation constructors remain infallible because they accept no
        caller geometry or topology, and builder `new` remains infallible
        because validation is explicitly deferred to `build`.
    paths:
      include:
        - "/src/**/*.rs"
        - "/tests/**/*.rs"
        - "/benches/**/*.rs"
        - "/examples/**/*.rs"
        - "/docs/**/*.md"
        - "/README.md"
      exclude:
        - "/docs/archive/**"
    pattern-either:
      - pattern-regex: >-
          \bDelaunayTriangulation\b\s*(?:::\s*<[^;\n]+>\s*)?::\s*(?:new|new_with_(?:construction_statistics|options(?:_and_construction_statistics)?|topology_guarantee)|with_(?:kernel|topology_guarantee(?:_and_options)?|options_and_statistics))\s*\(
      - pattern-regex: '\bConvexHull\b\s*(?:::\s*<[^;\n]+>\s*)?::\s*from_triangulation\s*\('

  - id: delaunay.rust.no-infallible-fallible-constructor-definitions
    languages:
      - generic
    severity: WARNING
    message: "Public fallible constructors must use try_new*/try_with_* or try_from_* names."
    metadata:
      category: correctness
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/459"
      rationale: >-
        Public definitions on DelaunayTriangulation and ConvexHull must keep the
        parse boundary visible in the function name. Empty constructors are
        intentionally excluded because they accept no raw geometry or topology.
    paths:
      include:
        - "/src/delaunay/construction.rs"
        - "/src/geometry/algorithms/convex_hull.rs"
    pattern-either:
      - pattern-regex: >-
          (?s)\bimpl[^{}]*\bDelaunayTriangulation\b[^{}]*\{(?:(?!^\}).)*?^\s*pub\s+(?:const\s+)?fn\s+(?:new|new_with_(?:construction_statistics|options(?:_and_construction_statistics)?|topology_guarantee)|with_(?:kernel|topology_guarantee(?:_and_options)?|options_and_statistics))\s*\(
      - pattern-regex: '(?s)\bimpl[^{}]*\bConvexHull\b[^{}]*\{(?:(?!^\}).)*?^\s*pub\s+fn\s+from_triangulation\s*(?:<|\()'

  - id: delaunay.rust.no-fallible-new-or-from-constructor-definitions
    languages:
      - generic
    severity: WARNING
    message: "Fallible constructor definitions must not use new/from_*; use try_new*, try_from_*, TryFrom, parse, or descriptive try_* names."
    metadata:
      category: correctness
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/459"
      rationale: >-
        Constructor definitions returning Result are parse boundaries. Naming
        them new or from_* hides fallibility and invites storing raw invalidable
        values before validation.
    paths:
      include:
        - "/src/**/*.rs"
        - "/tests/semgrep/src/project_rules/**/*.rs"
    pattern-regex: >-
      (?s)^\s*(?:pub(?:\([^)]*\))?\s+)?(?:const\s+|async\s+)?fn\s+(?:new|from_(?!str\b)[A-Za-z0-9_]+)(?:<[^>{}]*>)?\s*\([^;{}]*?\)\s*->\s*Result\s*<

  - id: delaunay.rust.no-public-from-validated-constructors
    languages:
      - generic
    severity: WARNING
    message: "Keep from_validated* constructors private or crate-private; public constructors must parse through try_new*/try_from_* boundaries."
    metadata:
      category: correctness
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/459"
      rationale: >-
        from_validated* means the caller already has validation evidence. Public
        APIs should not ask callers to supply trusted data; they should parse and
        validate with try_new*, try_from_*, or equivalent fallible constructors.
    paths:
      include:
        - "/src/**/*.rs"
        - "/tests/semgrep/src/project_rules/**/*.rs"
    pattern-regex: '^\s*pub\s+(?:const\s+)?fn\s+from_validated[A-Za-z0-9_]*\s*\('

  - id: delaunay.rust.no-parallel-from-validated-with-data-constructors
    languages:
      - generic
    severity: WARNING
    message: "Prefer one from_validated* constructor that accepts all already-proved state, rather than parallel *_with_data variants."
    metadata:
      category: maintainability
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/459"
      rationale: >-
        Trusted constructors should be scarce and orthogonal. Optional payload
        data can be carried by one from_validated* helper instead of introducing
        a second trusted entry point with the same invariant proof.
    paths:
      include:
        - "/src/**/*.rs"
        - "/tests/semgrep/src/project_rules/**/*.rs"
    pattern-regex: '\bfn\s+from_validated[A-Za-z0-9_]*_with_data\s*\('

  - id: delaunay.rust.no-unreviewed-from-unchecked-constructors
    languages:
      - generic
    severity: WARNING
    message: "Do not add from_unchecked_* constructors; use a candidate type, try_new*/try_from_*, or from_validated*."
    metadata:
      category: correctness
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/459"
      rationale: >-
        Temporarily assembled invalidable state should live in an explicit
        candidate type until validation proof is consumed. New unchecked
        constructors silently create another invalid-state escape hatch.
    paths:
      include:
        - "/src/**/*.rs"
        - "/tests/semgrep/src/project_rules/**/*.rs"
    pattern-regex: '^\s*(?:pub(?:\([^)]*\))?\s+)?(?:const\s+|async\s+)?fn\s+from_unchecked_[A-Za-z0-9_]*\s*\('

  - id: delaunay.rust.no-slotmap-key-topology-deserialization
    languages:
      - generic
    severity: WARNING
    message: "Do not deserialize topology relationships from slotmap keys; deserialize UUIDs and resolve them inside Tds reconstruction."
    metadata:
      category: correctness
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/454"
      rationale: >-
        VertexKey and SimplexKey values are storage-local slotmap keys. Serialized
        topology must use stable vertex and simplex UUIDs, then resolve those UUIDs
        to fresh live keys while rebuilding the TDS.
    paths:
      include:
        - "/src/**/*.rs"
        - "/tests/semgrep/src/project_rules/**/*.rs"
    pattern-either:
      - pattern-regex: '\bnext_value\s*::\s*<\s*(?:Vec\s*<\s*)?(?:VertexKey|SimplexKey|SimplexVertexKeyBuffer|VertexKeyBuffer|SimplexKeyBuffer)\b'
      - pattern-regex: '\bnext_value\s*::\s*<\s*NeighborBuffer\s*<\s*(?:Option\s*<\s*)?SimplexKey\b'

  - id: delaunay.rust.no-simplex-slotmap-key-serialization
    languages:
      - generic
    severity: WARNING
    message: "Do not serialize Simplex slotmap-key fields; serialize simplex UUIDs plus Tds-level vertex/neighbor UUID relationships instead."
    metadata:
      category: correctness
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/454"
      rationale: >-
        Simplex vertex and neighbor slots contain VertexKey and SimplexKey values,
        which are storage-local handles. The wire format must carry UUIDs so it
        can be deserialized into fresh slotmap keys.
    paths:
      include:
        - "/src/core/simplex.rs"
        - "/tests/semgrep/src/project_rules/**/*.rs"
    pattern-regex: '\bserialize_field\s*\(\s*"(?:vertices|neighbors|neighbor|incident_simplex)"\s*,\s*&self\.'

  - id: delaunay.rust.no-simplex-new-constructor
    languages:
      - generic
    severity: WARNING
    message: "Use Simplex::try_new or Simplex::try_new_with_data so fallible simplex validation is explicit."
    metadata:
      category: correctness
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/442"
      rationale: >-
        Simplex construction validates D+1 vertex-key arity and duplicate keys.
        The constructor name must expose that boundary instead of looking like an
        infallible raw-value constructor.
    paths:
      include:
        - "/src/**/*.rs"
        - "/tests/**/*.rs"
        - "/benches/**/*.rs"
        - "/examples/**/*.rs"
    pattern-regex: '\bSimplex\s*::\s*new\s*\('

  - id: delaunay.rust.no-facet-new-constructors
    languages:
      - generic
    severity: WARNING
    message: "Use try_new for fallible facet handles, views, and iterators so validation and dimension-capacity errors are explicit."
    metadata:
      category: correctness
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/454"
      rationale: >-
        FacetHandle and FacetView validate simplex presence and facet index
        bounds, while facet iterators can fail when the dimension exceeds the
        u8 facet-index representation. Constructor names must expose those
        fallible boundaries.
    paths:
      include:
        - "/src/**/*.rs"
        - "/tests/**/*.rs"
        - "/benches/**/*.rs"
        - "/examples/**/*.rs"
    pattern-either:
      - pattern-regex: '\bFacetView\s*::\s*new\s*\('
      - pattern-regex: '\bFacetHandle\s*::\s*new\s*\('
      - pattern-regex: '\bAllFacetsIter\s*::\s*new\s*\('
      - pattern-regex: '\bBoundaryFacetsIter\s*::\s*new\s*\('

  - id: delaunay.rust.no-ridgehandle-new-constructor
    languages:
      - generic
    severity: WARNING
    message: "Use RidgeHandle::try_new for raw omitted indices, or the crate-private validated constructor after bounds are already proven."
    metadata:
      category: correctness
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/442"
      rationale: >-
        A RidgeHandle must identify a valid codimension-2 face in a live simplex.
        Public raw index construction must reject duplicate or out-of-range
        omitted indices instead of storing invalid ridge selectors for later
        validation.
    paths:
      include:
        - "/src/**/*.rs"
        - "/tests/**/*.rs"
        - "/benches/**/*.rs"
        - "/examples/**/*.rs"
    pattern-regex: '\bRidgeHandle\s*::\s*new\s*\('

  - id: delaunay.rust.no-edgekey-new-constructor
    languages:
      - generic
    severity: WARNING
    message: "Use EdgeKey::try_new with a live TDS for raw endpoints, or the crate-private validated constructor after edge incidence is already proven."
    metadata:
      category: correctness
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/454"
      rationale: >-
        An EdgeKey must identify a real edge in a live TDS, so public raw
        endpoint construction needs to reject duplicate, missing, or non-incident
        vertex keys instead of storing an invalid edge selector.
    paths:
      include:
        - "/src/**/*.rs"
        - "/tests/**/*.rs"
        - "/benches/**/*.rs"
        - "/examples/**/*.rs"
    pattern-regex: '\bEdgeKey\s*::\s*new\s*\('

  - id: delaunay.rust.no-edgekey-try-new-without-tds
    languages:
      - generic
    severity: WARNING
    message: "Pass a live TDS to EdgeKey::try_new so the edge can be proven to exist."
    metadata:
      category: correctness
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/454"
      rationale: >-
        EdgeKey::try_new must parse raw endpoint keys against live topology.
        A two-argument call can only check distinctness and cannot prove that the
        endpoints form a real edge.
    paths:
      include:
        - "/src/**/*.rs"
        - "/tests/**/*.rs"
        - "/benches/**/*.rs"
        - "/examples/**/*.rs"
    pattern-regex: '\bEdgeKey\s*::\s*try_new\s*\(\s*[^,\n()]+,\s*[^,\n()]+\s*\)'

  - id: delaunay.rust.no-runtime-topology-handle-serde
    languages:
      - generic
    severity: WARNING
    message: "Do not serialize runtime topology handles/views; serialize TDS UUID snapshots and rebuild fresh slotmap keys."
    metadata:
      category: correctness
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/454"
      rationale: >-
        FacetHandle, FacetView, and EdgeKey contain storage-local slotmap keys or
        references into one live TDS. They are useful for in-memory traversal and
        algorithms, but they are not durable interchange identifiers. Persistence
        must flow through UUID-keyed TDS snapshots instead.
    paths:
      include:
        - "/src/**/*.rs"
        - "/tests/**/*.rs"
        - "/benches/**/*.rs"
        - "/examples/**/*.rs"
    pattern-either:
      - pattern-regex: '(?s)#\s*\[\s*derive\s*\([^)]*\bSerialize\b[^)]*\)\s*\]\s*[^;{]*\bstruct\s+(?:FacetHandle|FacetView|EdgeKey)\b'
      - pattern-regex: '(?s)#\s*\[\s*derive\s*\([^)]*\bDeserialize\b[^)]*\)\s*\]\s*[^;{]*\bstruct\s+(?:FacetHandle|FacetView|EdgeKey)\b'
      - pattern-regex: '\bimpl(?:\s*<[^>]*>)?\s+(?:serde\s*::\s*)?Serialize\s+for\s+(?:(?:crate|self|super)\s*::\s*)?(?:(?:tds|core\s*::\s*(?:facet|edge))\s*::\s*)?(?:FacetHandle|FacetView|EdgeKey)\b' # yamllint disable-line rule:line-length
      - pattern-regex: '\bimpl(?:\s*<[^>]*>)?\s+(?:serde\s*::\s*)?Deserialize(?:\s*<[^>]*>)?\s+for\s+(?:(?:crate|self|super)\s*::\s*)?(?:(?:tds|core\s*::\s*(?:facet|edge))\s*::\s*)?(?:FacetHandle|FacetView|EdgeKey)\b' # yamllint disable-line rule:line-length

  - id: delaunay.rust.no-tds-storage-map-serde
    languages:
      - generic
    severity: WARNING
    message: "Do not serialize or deserialize TDS StorageMap/DenseSlotMap storage; use UUID-keyed snapshot records and rebuild fresh slotmap keys."
    metadata:
      category: correctness
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/454"
      rationale: >-
        DenseSlotMap/StorageMap layouts and generated keys are process-local storage
        details. TDS persistence must serialize stable vertex/simplex UUID records
        and UUID relationships, then reconstruct fresh keys during deserialization.
    paths:
      include:
        - "/src/core/**/*.rs"
        - "/tests/semgrep/src/project_rules/**/*.rs"
    pattern-either:
      - pattern-regex: '\bserialize_field\s*\(\s*"(?:vertices|simplices)"\s*,\s*&(?:self|tds)\.(?:vertices|simplices)\b'
      - pattern-regex: '\bOption\s*<\s*StorageMap\s*<\s*(?:VertexKey|SimplexKey)\b'
      - pattern-regex: '\b(?:serialized|snapshot)_simplices\s*:\s*StorageMap\s*<\s*SimplexKey\b'

  - id: delaunay.rust.no-runtime-topology-keys-in-snapshot-records
    languages:
      - generic
    severity: WARNING
    message: "Snapshot/serialized topology records must store UUID relationships, not runtime slotmap keys or topology handles."
    metadata:
      category: correctness
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/454"
      rationale: >-
        Snapshot-shaped records cross persistence and codec boundaries. Storing
        VertexKey, SimplexKey, FacetHandle, FacetView, or EdgeKey there would
        smuggle process-local slotmap identity into durable data instead of
        rebuilding fresh keys from stable UUID relationships.
    paths:
      include:
        - "/src/**/*.rs"
        - "/tests/semgrep/src/project_rules/**/*.rs"
    pattern-regex: '(?s)\bstruct\s+(?:Raw)?[A-Za-z0-9_]*(?:Snapshot|Serialized)[A-Za-z0-9_]*\s*(?:<[^>{}]*>)?\s*\{[^{}]*(?:\b(?:VertexKey|SimplexKey|FacetHandle|FacetView|EdgeKey)\b|Vec\s*<\s*(?:Option\s*<\s*)?(?:VertexKey|SimplexKey)\b|NeighborBuffer\s*<\s*(?:Option\s*<\s*)?SimplexKey\b|SmallBuffer\s*<\s*(?:VertexKey|SimplexKey|FacetHandle|EdgeKey)\b)[^{}]*\}' # yamllint disable-line rule:line-length

  - id: delaunay.rust.raw-tds-snapshot-uuid-maps-require-duplicate-key-deserializers
    languages:
      - generic
    severity: WARNING
    message: "RawTdsSnapshot UUID relationship maps must use duplicate-key-rejecting custom deserializers."
    metadata:
      category: correctness
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/454"
      rationale: >-
        JSON and some other object-like codecs can otherwise accept duplicate
        UUID keys with last-key-wins semantics. Raw snapshot relationship maps
        must reject duplicate simplex UUIDs before validation and hydration.
        The negative lookbehinds in this rule intentionally match the current
        rustfmt-consistent serde attribute layout for `simplex_vertices`,
        `simplex_neighbors`, and `simplex_vertex_offsets`. They expect specific
        indentation and line structure for those field attributes; different
        indentation or line breaks can produce false positives even when the
        required deserializers are present.
    paths:
      include:
        - "/src/core/tds_snapshot.rs"
        - "/tests/semgrep/src/project_rules/**/*.rs"
    pattern-either:
      - pattern-regex: '(?m)(?<!    #\[serde\(deserialize_with = "deserialize_simplex_vertices_no_duplicates"\)\]\n)^\s*simplex_vertices\s*:\s*FastHashMap\s*<\s*Uuid\s*,' # yamllint disable-line rule:line-length
      - pattern-regex: '(?m)(?<!    #\[serde\(deserialize_with = "deserialize_simplex_neighbors_no_duplicates"\)\]\n)^\s*simplex_neighbors\s*:\s*FastHashMap\s*<\s*Uuid\s*,' # yamllint disable-line rule:line-length
      - pattern-regex: '(?m)(?<!    #\[serde\(\n        default,\n        deserialize_with = "deserialize_simplex_vertex_offsets_no_duplicates"\n    \)\]\n)^\s*simplex_vertex_offsets\s*:\s*FastHashMap\s*<\s*Uuid\s*,' # yamllint disable-line rule:line-length

  - id: delaunay.rust.no-public-tds-snapshot-internals
    languages:
      - generic
    severity: WARNING
    message: "Keep TDS snapshot internals private; expose persistence through Tds Serialize/Deserialize instead."
    metadata:
      category: api
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/454"
      rationale: >-
        RawTdsSnapshot and TdsSnapshot are private parse-don't-validate stages.
        Making them public would stabilize an implementation detail and invite
        callers to bypass the validated Tds hydration boundary.
    paths:
      include:
        - "/src/**/*.rs"
        - "/tests/semgrep/src/project_rules/**/*.rs"
    pattern-either:
      - pattern-regex: '^\s*pub\s+(?:struct|enum)\s+(?:RawTdsSnapshot|RawSnapshotSimplex|TdsSnapshot|TdsSnapshotError|TdsSnapshotSimplex)\b'
      - pattern-regex: '^\s*pub\s+mod\s+tds_snapshot\b'
      - pattern-regex: '^\s*pub\s+use\s+.*\btds_snapshot\b'

  - id: delaunay.rust.tds-serialize-must-use-snapshot
    languages:
      - generic
    severity: WARNING
    message: "Tds serialization must go through TdsSnapshot::from_tds, not direct slotmap storage fields."
    metadata:
      category: correctness
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/454"
      rationale: >-
        The Tds Serialize implementation is the public persistence boundary. It
        must validate the live topology, convert slotmap-local keys into UUID
        relationships, and serialize the raw snapshot image rather than exposing
        StorageMap internals.
    paths:
      include:
        - "/src/core/tds_snapshot.rs"
        - "/tests/semgrep/src/project_rules/**/*.rs"
    pattern-regex: '(?s)impl[^{}]*\bSerialize\s+for\s+Tds\b[^{}]*\{(?:(?!TdsSnapshot::from_tds).)*\b(?:self|tds)\.(?:vertices|simplices|uuid_to_vertex_key|uuid_to_simplex_key)\b' # yamllint disable-line rule:line-length

  - id: delaunay.rust.public-error-enums-non-exhaustive
    languages:
      - generic
    severity: WARNING
    message: "Public error enums must be #[non_exhaustive] so new typed error variants remain semver-compatible."
    metadata:
      category: maintainability
      rationale: >-
        Public error enums are part of the API contract. Marking them
        non-exhaustive lets the crate add orthogonal, more precise error
        variants without forcing callers into a breaking exhaustive match.
    paths:
      include:
        - "/src/**/*.rs"
        - "/src/project_rules/**/*.rs"
      exclude:
        - "/tests/semgrep/**"
    pattern-regex: '(?m)(?<!#\[non_exhaustive\]\n)^\s*pub\s+enum\s+[A-Za-z0-9_]*Error\b'

  - id: delaunay.rust.no-stringly-generator-error-payloads
    languages:
      - generic
    severity: WARNING
    message: >-
      Store generator scalar/range/count error payloads as coordinate types,
      CoordinateRange<T>, or numeric count/index types, not preformatted Strings.
    metadata:
      category: correctness
      rationale: >-
        Random generator errors should preserve validated coordinate values and
        discrete count/index values for callers to pattern-match; Display
        formatting belongs at presentation time, not in the error payload.
    paths:
      include:
        - "/src/geometry/util/point_generation.rs"
        - "/src/geometry/util/triangulation_generation.rs"
        - "/tests/semgrep/src/project_rules/**/*.rs"
    pattern-either:
      - pattern-regex: >-
          (?s)pub\s+enum\s+InvalidPositiveScalar(?:\s*<[^>{}]*>)?\s*\{.*?\bNonPositive\s*\{[^}]*\bvalue\s*:\s*String\s*,
      - pattern-regex: >-
          (?s)\b[A-Za-z0-9_]+\s*\{[^}]*\b(?:min_distance|bounds_min|bounds_max|bounds)\s*:\s*String\s*,
      - pattern-regex: >-
          (?s)\bCoordinateConversionFailed\s*\{[^}]*\bvalue\s*:\s*String\s*,

  - id: delaunay.rust.no-stringly-coordinate-range-error-payloads
    languages:
      - generic
    severity: WARNING
    message: "Store non-increasing coordinate range bounds as coordinate scalars, not preformatted Strings."
    metadata:
      category: correctness
      rationale: >-
        CoordinateRangeError::NonIncreasing is produced after finite raw bounds
        have been parsed far enough to preserve their scalar values. Formatting
        those values into Strings discards typed validation evidence.
    paths:
      include:
        - "/src/geometry/coordinate_range.rs"
        - "/tests/semgrep/src/project_rules/**/*.rs"
    pattern-regex: >-
      (?s)\bNonIncreasing\s*\{[^}]*\b(?:min|max)\s*:\s*String\s*,

  - id: delaunay.rust.no-stringly-numeric-error-payloads
    languages:
      - generic
    severity: WARNING
    message: >-
      Store coordinate, conversion, quality, and measure diagnostic payloads as
      typed numeric/enumerated values, not preformatted Strings.
    metadata:
      category: correctness
      rationale: >-
        Numeric and non-finite diagnostics are parse-don't-validate boundaries:
        callers should be able to match CoordinateConversionValue,
        InvalidCoordinateValue, and domain reason enums without parsing Display
        text.
    paths:
      include:
        - "/src/geometry/traits/coordinate.rs"
        - "/src/geometry/util/conversions.rs"
        - "/src/geometry/util/circumsphere.rs"
        - "/src/geometry/quality.rs"
        - "/src/core/construction.rs"
        - "/src/core/algorithms/incremental_insertion.rs"
        - "/src/core/algorithms/flips.rs"
        - "/src/delaunay/construction.rs"
        - "/tests/semgrep/src/project_rules/**/*.rs"
    pattern-either:
      - pattern-regex: >-
          (?s)\b(?:ConversionFailed|NonFiniteValue|InvalidCoordinate)\s*\{[^}]*\bcoordinate_value\s*:\s*String\s*,
      - pattern-regex: >-
          (?s)\b(?:ConversionFailed|ValueConversionFailed)\s*\{[^}]*\bvalue\s*:\s*String\s*,[^}]*\b(?:details|reason)\s*:\s*String\s*,
      - pattern-regex: >-
          (?s)\bDegenerateSimplex\s*\{[^}]*\b(?:observed|epsilon|avg_edge_length)\s*:\s*(?:Option\s*<\s*)?String\s*,
      - pattern-regex: >-
          (?s)\bMatrixInversionFailed\s*\{[^}]*\bdetails\s*:\s*String\s*,
      - pattern-regex: >-
          (?s)\bPerturbationScaleConversion\s*\{[^}]*\bvalue\s*:\s*String\s*,
      - pattern-regex: >-
          (?s)\bDuplicateCoordinates\s*\{[^}]*\bcoordinates\s*:\s*String\s*,

  - id: delaunay.rust.flip-error-nested-payloads-boxed
    languages:
      - generic
    severity: WARNING
    message: "Box nested typed FlipError payloads and expose them with #[source]."
    metadata:
      category: maintainability
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/406"
      rationale: >-
        FlipError should keep scalar/key diagnostics inline while nested typed
        error payloads are boxed sources so the public enum size remains stable
        as subordinate error enums evolve.
    paths:
      include:
        - "/src/core/algorithms/flips.rs"
        - "/tests/semgrep/src/project_rules/**/*.rs"
    pattern-either:
      - pattern-regex: '^\s*(?:(?:reason|source):\s*|(?:#\[[^\]]+\]\s*)?)(?:Flip[A-Za-z0-9_]+Error|SimplexValidationError)\s*,'
      - pattern-regex: '^\s*[A-Za-z0-9_]+\s*\(\s*(?:#\[[^\]]+\]\s*)?(?:Flip[A-Za-z0-9_]+Error|SimplexValidationError)\s*\),'

  - id: delaunay.rust.flip-error-boxed-payloads-are-sources
    languages:
      - generic
    severity: WARNING
    message: >-
      Mark boxed nested FlipError fields with #[source] so callers can traverse
      the typed error chain.
    metadata:
      category: maintainability
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/406"
      rationale: >-
        Boxed nested flip errors should remain visible through the standard
        Error::source chain instead of becoming display-only diagnostics.
    paths:
      include:
        - "/src/core/algorithms/flips.rs"
        - "/tests/semgrep/src/project_rules/**/*.rs"
    # yamllint disable rule:line-length
    pattern-regex: >-
      (?m)(?<!    #\[source\]\n)(?<!        #\[source\]\n)(?<!            #\[source\]\n)^\s*(?:reason|source):\s*Box<(?:Flip[A-Za-z0-9_]+Error|SimplexValidationError)>\s*,
    # yamllint enable rule:line-length

  - id: delaunay.rust.no-public-unchecked-apis
    languages:
      - generic
    severity: WARNING
    message: "Keep *_unchecked APIs private so invalid-state escape hatches do not become public contracts."
    metadata:
      category: correctness
      rationale: >-
        Unchecked helpers should stay behind validated constructors, parsers, or
        setters rather than becoming public API contracts.
    paths:
      include:
        - "/src/**/*.rs"
        - "/src/project_rules/**/*.rs"
      exclude:
        - "/tests/semgrep/**"
    pattern-regex: '^\s*pub\s+(?:const\s+|async\s+|unsafe\s+)?fn\s+(?:[A-Za-z_][A-Za-z0-9_]*_unchecked|from_unchecked_[A-Za-z0-9_]*)\s*\(' # yamllint disable-line rule:line-length

  - id: delaunay.rust.no-public-vertex-new-with-uuid
    languages:
      - generic
    severity: WARNING
    message: "Use public Vertex::try_new_with_uuid for raw UUIDs; keep infallible UUID-preserving constructors crate-private."
    metadata:
      category: correctness
      rationale: >-
        Caller-provided UUIDs are invariant-bearing input. Public APIs must
        validate them before storing them in Vertex, while crate-internal
        UUID-preserving paths may remain infallible after validation has already
        happened at the boundary.
    paths:
      include:
        - "/src/core/vertex.rs"
        - "/tests/semgrep/src/project_rules/**/*.rs"
    pattern-regex: '^\s*pub\s+(?:const\s+)?fn\s+new_with_uuid\s*\('

  - id: delaunay.rust.no-unwrap-expect-in-doctests
    languages:
      - generic
    severity: WARNING
    message: "Use fallible doctest flow instead of unwrap() or expect() in public documentation examples."
    metadata:
      category: correctness
      rationale: >-
        Public Rust documentation examples should model typed error handling
        with DelaunayResult and ? rather than teaching panic-based control flow.
    paths:
      include:
        - "/src/**/*.rs"
        - "/tests/semgrep/doctests/**/*.txt"
        - "/doctests/**/*.txt"
        - "/tests/semgrep/src/project_rules/**/*.rs"
    patterns:
      - pattern-regex: '^\s*//[!/]\s*(?:#\s*)?.*(?:\b[\w:]+|[\]\)])\.(unwrap(?:_[A-Za-z0-9_]+)?|expect)\s*\('

  - id: delaunay.rust.no-unwrap-expect-in-markdown-examples
    languages:
      - generic
    severity: WARNING
    message: "Use fallible example flow instead of unwrap*() or expect() in public Markdown examples."
    metadata:
      category: correctness
      rationale: >-
        Public Markdown examples should model typed error handling with
        DelaunayResult and ? rather than teaching panic-based or fallback-based
        control flow.
    paths:
      include:
        - "/README.md"
        - "/docs/**/*.md"
      exclude:
        - "/docs/archive/**"
    pattern-regex: '\.(?:unwrap(?:_[A-Za-z0-9_]+)?|expect)\s*\('

  - id: delaunay.rust.no-box-dyn-error-in-doctests
    languages:
      - generic
    severity: WARNING
    message: "Use DelaunayResult or a typed error in doctests instead of erased dynamic errors."
    metadata:
      category: maintainability
      rationale: >-
        Public documentation should model the crate's typed error surface rather
        than Box<dyn Error>, &dyn Error, or anyhow::Error.
    paths:
      include:
        - "/src/**/*.rs"
        - "/tests/semgrep/doctests/**/*.txt"
        - "/doctests/**/*.txt"
        - "/tests/semgrep/src/project_rules/**/*.rs"
    pattern-regex: '^\s*//[!/].*(?:Box\s*<\s*dyn\s+(?:std::error::Error|Error)|&\s*dyn\s+(?:std::error::Error|Error)|anyhow::Error|anyhow::Result)' # yamllint disable-line rule:line-length

  - id: delaunay.rust.prefer-assert-matches-in-doctests
    languages:
      - generic
    severity: WARNING
    message: "Use std::assert_matches! instead of assert!(matches!(...)) in public documentation examples."
    metadata:
      category: maintainability
      rationale: >-
        Public Rust documentation examples should teach std::assert_matches!,
        which reports the unmatched value on failure instead of the bare boolean
        that assert!(matches!(...)) produces.
    paths:
      include:
        - "/src/**/*.rs"
        - "/tests/semgrep/doctests/**/*.txt"
        - "/doctests/**/*.txt"
        - "/tests/semgrep/src/project_rules/**/*.rs"
    pattern-regex: '^\s*//[!/].*\bassert!\s*\(\s*matches!\s*\('

  - id: delaunay.rust.no-env-gated-stdio-diagnostics
    languages:
      - rust
    severity: WARNING
    message: "Environment-gated diagnostics should use tracing and repository feature gates instead of stdio macros."
    metadata:
      category: maintainability
      rationale: "Debug hooks should remain filterable through tracing and RUST_LOG."
    paths:
      include:
        - "/src/**/*.rs"
    pattern-either:
      - pattern: |
          if std::env::var_os($NAME).is_some() {
              ...
              println!(...);
              ...
          }
      - pattern: |
          if std::env::var_os($NAME).is_some() {
              ...
              eprintln!(...);
              ...
          }
      - pattern: |
          if env::var_os($NAME).is_some() {
              ...
              println!(...);
              ...
          }
      - pattern: |
          if env::var_os($NAME).is_some() {
              ...
              eprintln!(...);
              ...
          }

  - id: delaunay.rust.no-box-dyn-error-in-src
    languages:
      - rust
    severity: WARNING
    message: "Use a typed error enum instead of Box<dyn Error>, &dyn Error, or anyhow::Error."
    metadata:
      category: maintainability
      rationale: >-
        Public and production fallible paths should preserve typed error
        contracts rather than erasing error shape behind dynamic errors.
    paths:
      include:
        - "/src/**/*.rs"
        - "/tests/allocation_api.rs"
        - "/tests/delaunay_public_api_coverage.rs"
        - "/tests/prelude_exports.rs"
        - "/tests/public_*.rs"
      exclude:
        - "/tests/semgrep/**"
    patterns:
      # Regex is deliberate here: Rust AST patterns over-match associated
      # error types such as serde's `S::Error`; this rule is about exact
      # dynamic-error spellings in production code.
      - pattern-regex: >-
          ^[ \t]*[^\n]*(\bBox\s*<\s*dyn\s+(std::error::)?Error\b|&\s*dyn\s+(std::error::)?Error\b|\banyhow::Error\b)
      - pattern-not-regex: '^[ \t]*(//|///|/\*|\*)'
      - pattern-not-inside: |
          mod tests {
              ...
          }
      - pattern-not-inside: |
          #[cfg(test)]
          mod $MOD {
              ...
          }
      - pattern-not-inside: |
          #[cfg(any(test, ...))]
          mod $MOD {
              ...
          }
      - pattern-not-inside: |
          #[cfg(test)]
          fn $FUNC(...) {
              ...
          }
      - pattern-not-inside: |
          #[cfg(any(test, ...))]
          fn $FUNC(...) {
              ...
          }
      - pattern-not-inside: |
          #[cfg(test)]
          impl $TYPE {
              ...
          }
      - pattern-not-inside: |
          #[cfg(any(test, ...))]
          impl $TYPE {
              ...
          }

  - id: delaunay.rust.no-unwrap-expect-in-benches-examples
    languages:
      - rust
    severity: WARNING
    message: "Use explicit fixture error handling instead of unwrap() or expect() in benchmarks and examples."
    metadata:
      category: correctness
      rationale: >-
        Benchmarks and public examples should keep failure modes explicit so
        users and CI see the operation that failed instead of a panic-only
        unwrap/expect path.
      ported_from: "la-stack.rust.no-unwrap-expect-in-benches-examples"
    paths:
      include:
        - "/benches/**/*.rs"
        - "/examples/**/*.rs"
        - "/tests/semgrep/src/project_rules/rust_style.rs"
    pattern-either:
      - pattern: $VALUE.unwrap()
      - pattern: $VALUE.expect(...)

  - id: delaunay.rust.no-public-raw-bench-fixture-builders
    languages:
      - generic
    severity: WARNING
    message: >-
      Expose only validated benchmark fixture builders; keep raw
      invalid-topology fixture builders private.
    metadata:
      category: correctness
      rationale: >-
        Benchmark fixtures may deliberately construct invalid topology that
        normal public constructors reject. Public fixture constructors should
        validate the repair contract before handing the TDS to Criterion.
    paths:
      include:
        - "/src/bench_fixtures.rs"
        - "/tests/semgrep/src/project_rules/rust_style.rs"
    pattern-regex: >-
      (?ms)^\s*pub\s+fn\s+(?!validated_)[A-Za-z0-9_]+\s*\([^{};]*?\)\s*->\s*Result\s*<\s*[A-Za-z0-9_:<> ,]*Fixture[A-Za-z0-9_:<> ,]*\s*,

  - id: delaunay.rust.no-box-dyn-error-in-examples-benches
    languages:
      - rust
    severity: WARNING
    message: "Use concrete crate errors in examples and benchmarks instead of dynamic error erasure."
    metadata:
      category: maintainability
      rationale: >-
        Examples and benchmarks should model typed error handling that users
        can copy into their own code.
      ported_from: "causal-triangulations.rust.no-box-dyn-error-in-examples-benches"
    paths:
      include:
        - "/examples/**/*.rs"
        - "/benches/**/*.rs"
        - "/tests/semgrep/src/project_rules/rust_style.rs"
    patterns:
      - pattern-regex: >-
          ^[ \t]*[^\n]*(\bBox\s*<\s*dyn\s+(std::error::)?Error\b|&\s*dyn\s+(std::error::)?Error\b|\banyhow::Error\b)
      - pattern-not-regex: '^[ \t]*(//|///|/\*|\*)'

  - id: delaunay.rust.no-clippy-allow-lints
    languages:
      - rust
    severity: WARNING
    message: "Use #[expect(..., reason = ...)] instead of #[allow(...)] for Clippy suppressions."
    metadata:
      category: maintainability
      rationale: >-
        Clippy suppressions should be checked by the compiler and carry a
        stable reason so stale suppressions are noticed during linting.
    paths:
      include:
        - "/src/**/*.rs"
        - "/tests/**/*.rs"
        - "/benches/**/*.rs"
      exclude:
        - "/tests/semgrep/**"
    pattern-regex: '^\s*#\s*\[\s*allow\s*\(\s*clippy::'

  - id: delaunay.rust.no-ignored-tests
    languages:
      - generic
    severity: WARNING
    message: "Gate slow tests with an explicit cfg feature instead of #[ignore]."
    metadata:
      category: maintainability
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/380"
      rationale: >-
        The routine test suite has explicit cfg-gated buckets. Marking tests
        ignored hides them from the commands that are supposed to run the
        selected bucket.
    paths:
      include:
        - "/src/**/*.rs"
        - "/tests/**/*.rs"
        - "/benches/**/*.rs"
      exclude:
        - "/tests/semgrep/**"
    pattern-regex: '^\s*#\s*\[\s*ignore(?:\s|=|\])'

  - id: delaunay.rust.expect-requires-reason
    languages:
      - rust
    severity: WARNING
    message: 'Add reason = "..." to #[expect(...)] so lint suppressions remain auditable.'
    metadata:
      category: maintainability
      rationale: >-
        Repository guidance prefers documented lint expectations over
        unexplained suppressions.
    paths:
      include:
        - "/src/**/*.rs"
        - "/tests/**/*.rs"
        - "/benches/**/*.rs"
      exclude:
        - "/tests/semgrep/**"
    patterns:
      # Regex keeps this intentionally scoped to one-line `#[expect(...)]`
      # attributes; multiline attributes remain a review concern.
      - pattern-regex: '^\s*#\s*\[\s*expect\s*\([^\]\n]*\)\s*\]'
      - pattern-not-regex: '\breason\s*='

  - id: delaunay.rust.prefer-prelude-imports-in-examples-benches
    languages:
      - rust
    severity: WARNING
    message: "Use focused delaunay::prelude imports in examples and benchmarks instead of deep crate module paths."
    metadata:
      category: maintainability
      rationale: >-
        Public examples and benchmarks should model the small, orthogonal
        prelude import surfaces that users can copy into their own code.
    paths:
      include:
        - "/examples/**/*.rs"
        - "/benches/**/*.rs"
        - "/src/project_rules/**/*.rs"
    patterns:
      - pattern-either:
          - pattern-regex: '^\s*use\s+delaunay::(builder|construction|core|delaunayize|diagnostics|flips)::'
          - pattern-regex: '^\s*use\s+delaunay::(geometry|insertion|repair|topology|validation)::'
      - pattern-not-regex: '^\s*use\s+delaunay::prelude::'

  - id: delaunay.rust.prefer-prelude-imports-in-delaunay-doctests
    languages:
      - rust
    severity: WARNING
    message: >-
      Use focused delaunay::prelude imports in public Delaunay doctests
      instead of deep crate module paths.
    metadata:
      category: maintainability
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/355"
      rationale: >-
        Public doctests should model the small, orthogonal prelude import
        surfaces that users can copy into their own code.
    paths:
      include:
        - "/src/**/*.rs"
        - "/tests/semgrep/src/project_rules/**/*.rs"
    patterns:
      - pattern-either:
          - pattern-regex: '^\s*//[/!]\s*(?:#\s*)?use\s+delaunay::(builder|construction|core|delaunayize|diagnostics|flips)::'
          - pattern-regex: '^\s*//[/!]\s*(?:#\s*)?use\s+delaunay::(geometry|insertion|repair|topology|validation)::'
      - pattern-not-regex: '^\s*//[/!]\s*(?:#\s*)?use\s+delaunay::prelude::'

  - id: delaunay.docs.check-before-fix-command-order
    languages:
      - regex
    severity: WARNING
    message: "Document non-mutating just checks before mutating just fixers."
    metadata:
      category: maintainability
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/379"
      rationale: >-
        User-facing workflow examples should show non-mutating checks before
        mutating fixers so formatting drift is inspected before files are
        rewritten.
    paths:
      include:
        - "/**/*.md"
        - "/justfile"
    pattern-either:
      - pattern-regex: '(?ms)^\s*(?:@echo\s+"?\s*)?just\s+fix\b[^\n]*(?:\n\s*(?:#[^\n]*)?)*?\n\s*(?:@echo\s+"?\s*)?just\s+check\b' # yamllint disable-line rule:line-length
      - pattern-regex: '(?ms)^\s*(?:@echo\s+"?\s*)?just\s+python-fix\b[^\n]*(?:\n\s*(?:#[^\n]*)?)*?\n\s*(?:@echo\s+"?\s*)?just\s+python-check\b' # yamllint disable-line rule:line-length
      - pattern-regex: '(?ms)^\s*(?:@echo\s+"?\s*)?just\s+yaml-fix\b[^\n]*(?:\n\s*(?:#[^\n]*)?)*?\n\s*(?:@echo\s+"?\s*)?just\s+yaml-check\b' # yamllint disable-line rule:line-length
      - pattern-regex: '(?ms)^\s*(?:@echo\s+"?\s*)?just\s+markdown-fix\b[^\n]*(?:\n\s*(?:#[^\n]*)?)*?\n\s*(?:@echo\s+"?\s*)?just\s+markdown-check\b' # yamllint disable-line rule:line-length
      - pattern-regex: '(?ms)^\s*(?:@echo\s+"?\s*)?just\s+toml-fix\b[^\n]*(?:\n\s*(?:#[^\n]*)?)*?\n\s*(?:@echo\s+"?\s*)?just\s+toml-check\b' # yamllint disable-line rule:line-length
      - pattern-regex: '(?ms)^\s*(?:@echo\s+"?\s*)?just\s+shell-fix\b[^\n]*(?:\n\s*(?:#[^\n]*)?)*?\n\s*(?:@echo\s+"?\s*)?just\s+shell-check\b' # yamllint disable-line rule:line-length

  - id: delaunay.github-actions.external-action-sha-pinned
    languages:
      - regex
    severity: WARNING
    message: "Pin external GitHub Actions to a full 40-character commit SHA."
    metadata:
      category: security
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/379"
      rationale: "Moving tags can change workflow behavior without review."
    paths:
      include:
        - "/.github/workflows/**/*.yml"
        - "/.github/workflows/**/*.yaml"
      exclude:
        - "/tests/semgrep/**"
    patterns:
      - pattern-regex: '(?m)^\s*uses:\s*(?!\./)(?!docker://)[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+(?:/[A-Za-z0-9_.-]+)?@(?![a-fA-F0-9]{40}(?:\s+#|$))[^\s#]+' # yamllint disable-line rule:line-length

  - id: delaunay.github-actions.external-action-approved-allowlist
    languages:
      - regex
    severity: WARNING
    message: "Use only approved external GitHub Actions, or update the repository allowlist deliberately."
    metadata:
      category: security
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/379"
      rationale: "A small allowlist keeps workflow supply-chain review explicit."
    paths:
      include:
        - "/.github/workflows/**/*.yml"
        - "/.github/workflows/**/*.yaml"
      exclude:
        - "/tests/semgrep/**"
    patterns:
      - pattern-regex: '(?m)^\s*uses:\s*(?!\./)(?!docker://)(?!(?:actions/checkout|actions/cache|actions/upload-artifact|actions/download-artifact|actions/github-script|actions/setup-python|actions-rust-lang/setup-rust-toolchain|astral-sh/setup-uv|taiki-e/cache-cargo-install-action|github/codeql-action/(?:upload-sarif|init|analyze)|codecov/codecov-action|codacy/codacy-coverage-reporter-action|codacy/codacy-analysis-cli-action|zizmorcore/zizmor-action)@)[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+(?:/[A-Za-z0-9_.-]+)?@' # yamllint disable-line rule:line-length

  - id: delaunay.github-actions.external-action-version-comment
    languages:
      - regex
    severity: WARNING
    message: "Keep a readable version comment next to external GitHub Action SHA pins."
    metadata:
      category: maintainability
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/379"
      rationale: "Version comments make Dependabot updates and human review manageable."
    paths:
      include:
        - "/.github/workflows/**/*.yml"
        - "/.github/workflows/**/*.yaml"
      exclude:
        - "/tests/semgrep/**"
    patterns:
      - pattern-regex: '(?m)^\s*uses:\s*(?!\./)(?!docker://)[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+(?:/[A-Za-z0-9_.-]+)?@[a-fA-F0-9]{40}\s*$' # yamllint disable-line rule:line-length

  - id: delaunay.github-actions.checkout-persist-credentials-false
    languages:
      - regex
    severity: WARNING
    message: "Set persist-credentials: false on actions/checkout steps."
    metadata:
      category: security
      rationale: >-
        Checkout credentials should not remain available to later workflow steps
        unless a job explicitly needs them.
    paths:
      include:
        - "/.github/workflows/**/*.yml"
        - "/.github/workflows/**/*.yaml"
        - "/tests/semgrep/.github/workflows/**/*.yml"
        - "/tests/semgrep/.github/workflows/**/*.yaml"
    patterns:
      - pattern-regex: '(?m)^[ \t]*(?:-[ \t]*)?uses:[ \t]*actions/checkout@[a-fA-F0-9]{40}[^\n]*\n(?!(?:[ \t]*with:\n)?(?:[ \t]{10,}\S[^\n]*\n){0,8}[ \t]{10,}persist-credentials:[ \t]*false\b)' # yamllint disable-line rule:line-length

  - id: delaunay.github-actions.no-pull-request-target
    languages:
      - regex
    severity: WARNING
    message: "Avoid pull_request_target; use pull_request unless a workflow has a documented security review."
    metadata:
      category: security
      rationale: >-
        pull_request_target runs with base-repository privileges and is risky
        for workflows that touch untrusted PR content.
    paths:
      include:
        - "/.github/workflows/**/*.yml"
        - "/.github/workflows/**/*.yaml"
        - "/tests/semgrep/.github/workflows/**/*.yml"
        - "/tests/semgrep/.github/workflows/**/*.yaml"
    pattern-regex: '(?m)^\s*pull_request_target\s*:'

  - id: delaunay.github-actions.github-script-no-expression-interpolation
    languages:
      - regex
    severity: WARNING
    message: "Pass GitHub expression values to actions/github-script through env instead of interpolating inside script blocks."
    metadata:
      category: security
      rationale: >-
        Interpolating ${{ ... }} directly into JavaScript can turn workflow
        context strings into executable code.
    paths:
      include:
        - "/.github/workflows/**/*.yml"
        - "/.github/workflows/**/*.yaml"
        - "/tests/semgrep/.github/workflows/**/*.yml"
        - "/tests/semgrep/.github/workflows/**/*.yaml"
    patterns:
      - pattern-regex: '(?ms)^\s*script:\s*\|\n(?:(?!^\s*-\s+(?:name|uses):).)*\$\{\{' # yamllint disable-line rule:line-length

  - id: delaunay.github-actions.uv-sync-locked-in-workflows
    languages:
      - regex
    severity: WARNING
    message: "Use uv sync --locked in GitHub Actions workflows."
    metadata:
      category: reproducibility
      rationale: "Workflow dependency installs should fail on lockfile drift instead of silently resolving new versions."
    paths:
      include:
        - "/.github/workflows/**/*.yml"
        - "/.github/workflows/**/*.yaml"
        - "/tests/semgrep/.github/workflows/**/*.yml"
        - "/tests/semgrep/.github/workflows/**/*.yaml"
    patterns:
      - pattern-regex: '(?m)^\s*(?:run:\s*)?uv\s+sync\b(?![^\n]*\s--locked\b)[^\n]*$' # yamllint disable-line rule:line-length

  - id: delaunay.python.no-broad-exception
    languages:
      - python
    severity: WARNING
    message: "Catch a specific exception type instead of broad Exception."
    metadata:
      category: maintainability
      rationale: >-
        Python tooling should surface expected failure modes explicitly instead
        of swallowing unrelated errors.
    paths:
      include:
        - "/scripts/**/*.py"
      exclude:
        - "/tests/semgrep/**"
    pattern-regex: '^\s*except\s+Exception(?:\s+as\s+\w+)?\s*:'

  - id: delaunay.python.no-raw-exception-in-tests
    languages:
      - python
    severity: WARNING
    message: "Raise a specific exception type in Python tests instead of raw Exception."
    metadata:
      category: maintainability
      rationale: "Typed exceptions make test failures and expected errors easier to diagnose."
    paths:
      include:
        - "/scripts/tests/**/*.py"
      exclude:
        - "/tests/semgrep/**"
    pattern: raise Exception(...)

  - id: delaunay.python.no-adhoc-completedprocess-mock
    languages:
      - python
    severity: WARNING
    message: "Use subprocess.CompletedProcess[str] instead of ad hoc Mock stdout/returncode objects."
    metadata:
      category: maintainability
      rationale: >-
        Command-wrapper tests should use the real subprocess result shape so
        mocks stay aligned with production subprocess APIs.
    paths:
      include:
        - "/scripts/tests/**/*.py"
      exclude:
        - "/tests/semgrep/**"
    pattern-either:
      - patterns:
          - pattern-either:
              - pattern: |
                  $PROC = Mock(...)
                  ...
                  $PROC.stdout = ...
              - pattern: |
                  $PROC = unittest.mock.Mock(...)
                  ...
                  $PROC.stdout = ...
              - pattern: |
                  $PROC = mock.Mock(...)
                  ...
                  $PROC.stdout = ...
              - pattern: |
                  $PROC = MagicMock(...)
                  ...
                  $PROC.stdout = ...
              - pattern: |
                  $PROC = unittest.mock.MagicMock(...)
                  ...
                  $PROC.stdout = ...
              - pattern: |
                  $PROC = mock.MagicMock(...)
                  ...
                  $PROC.stdout = ...
      - patterns:
          - pattern-either:
              - pattern: |
                  $PROC = Mock(...)
                  ...
                  $PROC.returncode = ...
              - pattern: |
                  $PROC = unittest.mock.Mock(...)
                  ...
                  $PROC.returncode = ...
              - pattern: |
                  $PROC = mock.Mock(...)
                  ...
                  $PROC.returncode = ...
              - pattern: |
                  $PROC = MagicMock(...)
                  ...
                  $PROC.returncode = ...
              - pattern: |
                  $PROC = unittest.mock.MagicMock(...)
                  ...
                  $PROC.returncode = ...
              - pattern: |
                  $PROC = mock.MagicMock(...)
                  ...
                  $PROC.returncode = ...
      - pattern: Mock(..., stdout=..., ...)
      - pattern: unittest.mock.Mock(..., stdout=..., ...)
      - pattern: mock.Mock(..., stdout=..., ...)
      - pattern: MagicMock(..., stdout=..., ...)
      - pattern: unittest.mock.MagicMock(..., stdout=..., ...)
      - pattern: mock.MagicMock(..., stdout=..., ...)
      - pattern: Mock(..., returncode=..., ...)
      - pattern: unittest.mock.Mock(..., returncode=..., ...)
      - pattern: mock.Mock(..., returncode=..., ...)
      - pattern: MagicMock(..., returncode=..., ...)
      - pattern: unittest.mock.MagicMock(..., returncode=..., ...)
      - pattern: mock.MagicMock(..., returncode=..., ...)

  - id: delaunay.python.no-direct-subprocess-run-outside-wrapper
    languages:
      - python
    severity: WARNING
    message: "Use subprocess_utils command wrappers instead of calling subprocess.run directly."
    metadata:
      category: security
      rationale: >-
        Support scripts should inherit the repository's subprocess hardening for
        executable resolution, shell rejection, text output, and timeouts.
    paths:
      include:
        - "/scripts/**/*.py"
        - "/tests/semgrep/scripts/tests/**/*.py"
      exclude:
        - "/scripts/subprocess_utils.py"
        - "/scripts/tests/**/*.py"
    pattern: subprocess.run(...)

  - id: delaunay.python.no-untyped-defs-in-scripts
    languages:
      - python
    severity: WARNING
    message: "Add an explicit return annotation to script functions."
    metadata:
      category: maintainability
      rationale: "Typed script helpers are easier for ty and reviewers to reason about."
    paths:
      include:
        - "/scripts/**/*.py"
      exclude:
        - "/tests/semgrep/**"
    # Regex catches obvious unannotated definitions while avoiding a custom
    # Python parser rule that would duplicate ty.
    pattern-regex: '^( {0,4}|\t)(async\s+)?def\s+[A-Za-z_][A-Za-z0-9_]*\([^#\n]*\)\s*:'

  - id: delaunay.python.ci-json-loads-reject-nonfinite-constants
    languages:
      - python
    severity: WARNING
    message: "Decode CI-owned JSON with parse_constant so NaN and infinity cannot enter boundary models."
    metadata:
      category: correctness
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/429"
      rationale: >-
        Python's json decoder accepts NaN and infinity by default. CI filters
        that forward SARIF or other JSON artifacts should reject those tokens
        before constructing typed boundary models.
    paths:
      include:
        - "/scripts/ci/**/*.py"
        - "/tests/semgrep/scripts/tests/python_parse_boundaries.py"
    patterns:
      - pattern-either:
          - pattern: json.loads(...)
          - pattern: json.load(...)
      - pattern-not: json.loads(..., parse_constant=..., ...)
      - pattern-not: json.load(..., parse_constant=..., ...)

  - id: delaunay.python.ci-json-dumps-forbid-nonfinite-output
    languages:
      - python
    severity: WARNING
    message: "Encode CI-owned JSON with allow_nan=False so NaN and infinity cannot be emitted."
    metadata:
      category: correctness
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/429"
      rationale: >-
        CI filters that emit SARIF or other JSON artifacts should preserve
        strict JSON on output and fail instead of serializing NaN or infinity.
    paths:
      include:
        - "/scripts/ci/**/*.py"
        - "/tests/semgrep/scripts/tests/python_parse_boundaries.py"
    patterns:
      - pattern-either:
          - pattern: json.dumps(...)
          - pattern: json.dump(...)
      - pattern-not: json.dumps(..., allow_nan=False, ...)
      - pattern-not: json.dump(..., allow_nan=False, ...)

  - id: delaunay.python.ci-performance-metrics-require-positive-counts
    languages:
      - python
    severity: WARNING
    message: "Reject non-positive ci_performance_suite counts with <= 0, not only negative counts."
    metadata:
      category: correctness
      tracking_issue: "https://github.com/acgetchell/delaunay/issues/429"
      rationale: >-
        Construction metric sidecars are count-bearing boundary data. Zero
        vertices or zero simplices are invalid benchmark metrics, not
        meaningful baseline inputs.
    paths:
      include:
        - "/scripts/benchmark_utils.py"
        - "/tests/semgrep/scripts/tests/python_parse_boundaries.py"
    pattern-regex: '\b(?:vertices|simplices)\s*<\s*0\b'
