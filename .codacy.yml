---
# Codacy configuration for curated PR quality feedback.
#
# Enable or disable Codacy tools in the Codacy Code Patterns UI; this file
# records path and tool configuration only.
#
# Recommended enabled tools:
# - opengrep: repository-owned Rust Semgrep rules from semgrep.yaml
# - ruff: Python utility linting
# - bandit: Python security linting for production scripts, excluding tests
# - markdownlint: Codacy Markdown review, threshold configured in Codacy UI
# - shellcheck: shell-script linting
# - duplication: advisory duplicate-code metric
# - lizard: advisory complexity feedback
#
# Recommended disabled tools:
# - prospector, pylintpython3: redundant with Ruff/ty for this repo
# - trivy: dependency vulnerability scanning is handled by cargo-audit and
#   Dependabot unless this repository adds containers or IaC
# - jacksonlinter, spectral: not relevant to the current project surface

engines:
  bandit:
    include_paths:
      - "scripts/**/*.py"
    exclude_paths:
      - "scripts/tests/**"
  duplication:
    exclude_paths:
      - "docs/archive/**"
      - "target/**"
      - "node_modules/**"
      - ".git/**"
    config:
      languages:
        - "rust"
        - "python"
      minTokenMatch: 80
      skipLexicalErrors: true
      ignoreLiterals: true
      ignoreIdentifiers: false
      ignoreAnnotations: true
      ignoreUsings: true
  lizard:
    include_paths:
      - "src/**/*.rs"
      - "scripts/**/*.py"
    exclude_paths:
      - "scripts/tests/**"
      - "target/**"
      - "node_modules/**"
      - ".git/**"
  markdownlint:
    include_paths:
      - "**/*.md"
    exclude_paths:
      - "docs/archive/**"
      - "target/**"
      - "node_modules/**"
      - ".git/**"
  opengrep:
    include_paths:
      - "src/**/*.rs"
  ruff:
    include_paths:
      - "scripts/**/*.py"
  shellcheck:
    include_paths:
      - "scripts/**/*.sh"

exclude_paths:
  - "target/**"
  - "node_modules/**"
  - ".git/**"
  - "docs/archive/**"
  # Semgrep fixtures intentionally contain bad examples for rule tests.
  - "tests/semgrep/**"
