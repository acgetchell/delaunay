name: Bug report
description: Report a reproducible problem in delaunay.
title: "fix: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        For security vulnerabilities, do not open a public issue. Use the private reporting instructions in SECURITY.md.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true

  - type: textarea
    id: reproducer
    attributes:
      label: Minimal reproducer
      description: Provide the smallest Rust example, input point set, or test case that triggers the problem.
      render: rust
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include panic messages, validation errors, or incorrect output.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - delaunay version:
        - rustc version:
        - OS:
        - Feature flags:
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: This is not a security vulnerability.
          required: true
