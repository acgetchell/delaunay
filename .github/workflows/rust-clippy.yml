# Advanced Clippy analysis with SARIF output for security integration
# Note: Basic clippy checks are also run in the main CI workflow

name: "Clippy Security Analysis"

on:
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "17 22 * * 0" # Weekly on Sunday
  workflow_dispatch:
  # Run on main branch pushes for security scanning
  push:
    branches: ["main"]

# Security: Define minimal required permissions
permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  clippy-sarif:
    name: Clippy SARIF Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          cache: true
          cache-bin: false
          # toolchain, components, etc. are specified in rust-toolchain.toml

      - name: Set up just
        uses: ./.github/actions/setup-just

      - name: Resolve Clippy SARIF tool versions
        id: tool_versions
        shell: bash
        run: |
          set -euo pipefail

          clippy_sarif="$(just --evaluate clippy_sarif_version)"
          if [[ -z "$clippy_sarif" ]]; then
            echo "::error::Could not resolve clippy_sarif_version from justfile"
            exit 1
          fi

          sarif_fmt="$(just --evaluate sarif_fmt_version)"
          if [[ -z "$sarif_fmt" ]]; then
            echo "::error::Could not resolve sarif_fmt_version from justfile"
            exit 1
          fi

          {
            echo "CLIPPY_SARIF=$clippy_sarif"
            echo "SARIF_FMT=$sarif_fmt"
          } >> "$GITHUB_OUTPUT"

      - name: Cache clippy tools
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/bin/clippy-sarif
            ~/.cargo/bin/sarif-fmt
          key: clippy-sarif-${{ runner.os }}-${{ steps.tool_versions.outputs.CLIPPY_SARIF }}-sarif-fmt-${{ steps.tool_versions.outputs.SARIF_FMT }}

      - name: Install clippy-sarif tools
        env:
          CLIPPY_SARIF_VERSION: ${{ steps.tool_versions.outputs.CLIPPY_SARIF }}
          SARIF_FMT_VERSION: ${{ steps.tool_versions.outputs.SARIF_FMT }}
        run: |
          if ! command -v clippy-sarif &> /dev/null; then
            cargo install clippy-sarif --locked --version "${CLIPPY_SARIF_VERSION}"
          fi
          if ! command -v sarif-fmt &> /dev/null; then
            cargo install sarif-fmt --locked --version "${SARIF_FMT_VERSION}"
          fi

      - name: Run clippy with SARIF output
        run: |
          set -euo pipefail
          cargo clippy \
            --workspace \
            --all-targets \
            --all-features \
            --message-format=json \
            -- -W clippy::pedantic -W clippy::nursery -W clippy::cargo | \
            clippy-sarif | \
            tee rust-clippy-results.sarif | \
            sarif-fmt
        continue-on-error: true

      - name: Upload SARIF results
        if: >-
          always()
          && hashFiles('rust-clippy-results.sarif') != ''
          && (
            github.event_name != 'pull_request'
            || github.event.pull_request.head.repo.full_name == github.repository
          )
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: rust-clippy-results.sarif
          category: "clippy"
          wait-for-processing: true
