name: Generate Performance Baseline

# Generate performance baselines for main and release refs
# Security: All GitHub context variables are passed through safe environment variables
# to prevent code injection attacks via malicious branch names or commit data
on:
  # Trigger on main updates and release tag creation.
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "src/**"
      - "benches/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "scripts/benchmark_utils.py"

  # Manual trigger (supports regenerating a baseline for an existing ref)
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to benchmark (e.g. main or v0.7.5)"
        required: false
        default: main
        type: string

# Security: Define minimal required permissions
permissions:
  contents: read
  actions: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  UV_VERSION: "0.11.8"
  # Seed search limit for both old (pre-v0.8) and current env var names.
  # Old tags read DELAUNAY_BENCH_SEED_SEARCH_LIMIT; current code reads
  # DELAUNAY_BENCH_DISCOVER_SEEDS_LIMIT. Setting both ensures backward
  # compatibility when generating baselines for older releases.
  DELAUNAY_BENCH_SEED_SEARCH_LIMIT: 256
  DELAUNAY_BENCH_DISCOVER_SEEDS_LIMIT: 256

jobs:
  generate-baseline:
    concurrency:
      group: generate-baseline-${{ github.ref }}
      cancel-in-progress: false
    runs-on: macos-15 # Use same runner as benchmark workflow for consistency
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # Full history for tag operations

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          cache: true
          cache-bin: false
          # Toolchain from rust-toolchain.toml

      - name: Install uv (Python package manager)
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}

      - name: Verify uv installation
        run: uv --version

      - name: Determine target ref
        id: ref_info
        env:
          INPUT_REF: ${{ inputs.ref || '' }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          uv run benchmark-utils determine-ref

      - name: Checkout target ref (code under test)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ steps.ref_info.outputs.ref_name }}
          path: bench-target

      - name: Install target Rust toolchain
        env:
          BASELINE_REF: ${{ steps.ref_info.outputs.ref_name }}
        run: |
          set -euo pipefail

          channel="$(uv run python - <<'PY'
          from pathlib import Path
          import tomllib

          data = tomllib.loads(Path('bench-target/rust-toolchain.toml').read_text(encoding='utf-8'))
          print(data['toolchain']['channel'])
          PY
          )"

          echo "📌 Target ref: ${BASELINE_REF}"
          echo "🦀 Installing Rust toolchain: ${channel}"

          rustup toolchain install "${channel}" --profile minimal

      - name: Generate performance baseline
        env:
          BASELINE_REF: ${{ steps.ref_info.outputs.ref_name }}
        run: |
          set -euo pipefail

          echo "🚀 Generating performance baseline for ref ${BASELINE_REF}"

          # Generate baseline using fixed tooling (this checkout) against the target checkout.
          # Use --dev to match the comparison workflow's reduced Criterion settings;
          # benchmark-utils still runs the benchmark under Cargo's perf profile.
          uv run benchmark-utils generate-baseline \
            --project-root bench-target \
            --ref "${BASELINE_REF}" \
            --dev

          echo "✅ Baseline generated successfully"

          # Display baseline summary
          uv run benchmark-utils display-summary \
            --baseline "bench-target/baseline-artifact/baseline_results.txt"

      - name: Prepare baseline artifact
        env:
          BASELINE_REF: ${{ steps.ref_info.outputs.ref_name }}
          SAFE_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          # Create metadata file in the target checkout so it is included in the uploaded artifact.
          uv run benchmark-utils create-metadata \
            --ref "${BASELINE_REF}" \
            --output-dir "bench-target/baseline-artifact"

          # Extract the baseline commit from the baseline file for human-readable logging.
          baseline_commit="$(uv run python - <<'PY'
          from pathlib import Path
          import re

          text = Path('bench-target/baseline-artifact/baseline_results.txt').read_text(
              encoding='utf-8',
              errors='replace',
          )
          m = re.search(r'^Git commit:\s*(\S+)', text, flags=re.MULTILINE)
          print(m.group(1) if m else 'unknown')
          PY
          )"
          echo "BASELINE_COMMIT=${baseline_commit}" >> "$GITHUB_ENV"

          echo "📦 Artifact contents:"
          ls -la bench-target/baseline-artifact/

      - name: Create safe artifact name
        id: safe_name
        env:
          BASELINE_REF: ${{ steps.ref_info.outputs.ref_name }}
        run: uv run benchmark-utils sanitize-artifact-name --ref "$BASELINE_REF"

      - name: Upload baseline artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.safe_name.outputs.artifact_name }}
          path: bench-target/baseline-artifact/
          retention-days: 90 # Keep baselines ~90 days (align with repo settings; adjust if needed)
          compression-level: 6 # Good balance of speed/compression

      - name: Display next steps
        env:
          BASELINE_REF: ${{ steps.ref_info.outputs.ref_name }}
          SAFE_REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail

          echo "🎉 Performance baseline generated successfully!"
          echo ""
          echo "📋 Summary:"
          echo "  Ref: $BASELINE_REF"
          echo "  Commit: ${BASELINE_COMMIT:-unknown}"
          echo "  Artifact: ${{ steps.safe_name.outputs.artifact_name }}"
          echo ""
          echo "🔄 The benchmark workflow will now use this baseline for:"
          echo "  • Pull request performance testing"
          echo "  • Main branch regression detection"
          echo "  • Manual performance comparisons"
          echo ""
          if [ "$SAFE_REF_TYPE" = "tag" ]; then
            echo "💡 This baseline is now available for tag $BASELINE_REF"
          fi
