name: Repository Rule SARIF

concurrency:
  group: >
    semgrep-sarif-${{ github.workflow }}-${{
      github.event_name == 'pull_request' &&
      github.event.pull_request.number ||
      github.ref
    }}
  cancel-in-progress: true

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "42 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  semgrep-sarif:
    name: Repository Rule SARIF Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          cache: false
          cache-bin: false

      - name: Set up just
        id: setup_just
        uses: ./.github/actions/setup-just

      - name: Resolve uv version
        id: uv_version
        shell: bash
        run: |
          set -euo pipefail

          version="$(just --evaluate uv_version)"
          if [[ -z "$version" ]]; then
            echo "::error::Could not resolve uv_version from justfile"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ steps.uv_version.outputs.version }}

      - name: Run repository Semgrep rules
        id: semgrep
        run: |
          set +e
          uv run semgrep \
            --error \
            --strict \
            --timeout 30 \
            --config semgrep.yaml \
            --sarif \
            --output semgrep-results.sarif \
            .
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload SARIF results
        if: >-
          always() &&
          hashFiles('semgrep-results.sarif') != '' &&
          (
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository
          )
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep-repository-rules
          wait-for-processing: true

      - name: Fail on repository rule findings
        if: steps.semgrep.outputs.exit_code != '0'
        run: exit 1
