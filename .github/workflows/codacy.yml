# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow checks out code, runs selected Codacy engines, and integrates
# the results with GitHub Advanced Security code scanning.
# For more information on the Codacy analysis action usage and
# parameters, see https://github.com/codacy/codacy-analysis-cli-action.
# For more information on Codacy Analysis CLI in general, see
# https://github.com/codacy/codacy-analysis-cli.

name: Codacy Quality Scan

concurrency:
  # This concurrency group ensures that only one Codacy analysis runs at a time
  group: codacy-${{ github.ref_name }}
  cancel-in-progress: true

on:
  push:
    branches: ["main"]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: ["main"]
  schedule:
    - cron: "42 0 * * 1"

permissions:
  contents: read

jobs:
  codacy-quality-scan:
    permissions:
      # for actions/checkout to fetch code
      contents: read
      # for github/codeql-action/upload-sarif to upload SARIF results
      security-events: write
      # only required for a private repository by
      # github/codeql-action/upload-sarif to get the Action run status
      actions: read
    name: Codacy ${{ matrix.tool }} Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        tool:
          # Upload only repository-owned rules to GitHub Code Scanning.
          # Advisory quality engines stay in local/Codacy checks so they do
          # not create empty Security/Quality tool configurations.
          - opengrep
    steps:
      # Checkout the repository to the GitHub Actions runner
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: ".python-version"

      - name: Set Codacy paths
        run: |
          set -euo pipefail
          {
            echo "CODACY_WORKDIR=$RUNNER_TEMP/codacy-src"
            echo "CODACY_SARIF=$RUNNER_TEMP/results-${{ matrix.tool }}.sarif"
            echo "CODACY_HAS_UPLOADABLE_SARIF=false"
          } >> "$GITHUB_ENV"

      - name: Prepare workspace copy without .git
        run: |
          set -euo pipefail
          mkdir -p "$CODACY_WORKDIR"
          rsync -a --delete --exclude '.git' ./ "$CODACY_WORKDIR/"

      # Execute Codacy Analysis CLI with one selected tool per matrix entry.
      # Opengrep should mirror repository-owned rules from semgrep.yaml. The
      # SARIF splitter below defensively drops any default Codacy/OpenGrep
      # findings whose rule IDs do not belong to this repository.
      - name: Run Codacy Analysis CLI
        # Cap Codacy runtime so a hung analyzer does not consume the full job timeout.
        timeout-minutes: 20
        uses: codacy/codacy-analysis-cli-action@562ee3e92b8e92df8b67e0a5ff8aa8e261919c08 # v4.4.7
        with:
          # Check https://github.com/codacy/codacy-analysis-cli#project-token
          # to get your project token from your Codacy repository.
          # You can also omit the token and run the tools that support
          # default configurations
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          verbose: true
          directory: ${{ env.CODACY_WORKDIR }}
          output: ${{ env.CODACY_SARIF }}
          format: sarif
          tool: ${{ matrix.tool }}
          skip-uncommitted-files-check: true
          # Adjust severity of non-security issues
          gh-code-scanning-compat: true
          # Force 0 exit code to allow SARIF file generation
          # This will handover control about PR rejection to the GitHub side
          max-allowed-issues: 2147483647

      - name: Split SARIF runs for upload
        run: |
          set -euo pipefail
          python3 scripts/ci/filter_codacy_sarif.py "$CODACY_SARIF" "$RUNNER_TEMP/codacy-sarif"

      - name: Upload split SARIF files
        if: env.CODACY_HAS_UPLOADABLE_SARIF == 'true'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: ${{ env.CODACY_SPLIT_SARIF_DIR }}
          category: codacy-${{ matrix.tool }}
          wait-for-processing: true
