name: Papers

permissions:
  contents: read

concurrency:
  group: >
    papers-${{ github.workflow }}-${{
      github.event_name == 'pull_request' &&
      github.event.pull_request.number ||
      github.ref
    }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/papers.yml"
      - "justfile"
      - "notebooks/01_validation.ipynb"
      - "papers/**"
      - "pyproject.toml"
      - "scripts/paper_check.py"
      - "scripts/paper_pdf_normalize.py"
      - "scripts/paper_source_date.py"
      - "scripts/tests/test_paper_check.py"
      - "scripts/tests/test_paper_pdf_normalize.py"
      - "scripts/tests/test_paper_source_date.py"
      - "uv.lock"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/papers.yml"
      - "justfile"
      - "notebooks/01_validation.ipynb"
      - "papers/**"
      - "pyproject.toml"
      - "scripts/paper_check.py"
      - "scripts/paper_pdf_normalize.py"
      - "scripts/paper_source_date.py"
      - "scripts/tests/test_paper_check.py"
      - "scripts/tests/test_paper_pdf_normalize.py"
      - "scripts/tests/test_paper_source_date.py"
      - "uv.lock"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  papers:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          cache: true
          cache-bin: false

      - name: Resolve just version
        id: just_version
        run: |
          version="$(grep '^just_version :=' justfile | cut -d '"' -f 2)"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install just
        uses: taiki-e/cache-cargo-install-action@417450f3c33ee20393705369577571770643d4c7 # v3.0.7
        with:
          tool: just@${{ steps.just_version.outputs.version }}

      - name: Export paper tool versions
        id: tool_versions
        run: |
          {
            echo "TECTONIC_VERSION=$(just --evaluate tectonic_version)"
            echo "TEX_FMT_VERSION=$(just --evaluate tex_fmt_version)"
            echo "UV_VERSION=$(just --evaluate uv_version)"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ steps.tool_versions.outputs.UV_VERSION }}
          enable-cache: true

      - name: Sync Python tooling
        run: uv sync --locked --group dev --group notebooks

      - name: Cache Homebrew downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/Library/Caches/Homebrew
          key: homebrew-papers-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.github/workflows/papers.yml') }}
          restore-keys: homebrew-papers-${{ runner.os }}-${{ runner.arch }}-

      - name: Install paper system dependencies
        run: |
          brew update
          brew install fontconfig freetype graphite2 harfbuzz icu4c libpng pkgconf zlib
          icu_pkg_config="$(brew --prefix icu4c)/lib/pkgconfig"
          zlib_pkg_config="$(brew --prefix zlib)/lib/pkgconfig"
          export PKG_CONFIG_PATH="$icu_pkg_config:$zlib_pkg_config${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}"
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH" >> "$GITHUB_ENV"
          if ! command -v tlmgr >/dev/null; then
            brew install --cask basictex
          fi
          export PATH="/Library/TeX/texbin:$PATH"
          echo "/Library/TeX/texbin" >> "$GITHUB_PATH"
          if ! command -v chktex >/dev/null; then
            sudo "$(command -v tlmgr)" update --self
            sudo "$(command -v tlmgr)" install chktex
          fi

      - name: Install Tectonic
        uses: taiki-e/cache-cargo-install-action@417450f3c33ee20393705369577571770643d4c7 # v3.0.7
        with:
          tool: tectonic@${{ steps.tool_versions.outputs.TECTONIC_VERSION }}

      - name: Install tex-fmt
        uses: taiki-e/cache-cargo-install-action@417450f3c33ee20393705369577571770643d4c7 # v3.0.7
        with:
          tool: tex-fmt@${{ steps.tool_versions.outputs.TEX_FMT_VERSION }}

      - name: Build papers
        run: just papers

      - name: Verify paper artifacts are current
        run: |
          if [[ -n "$(git status --porcelain -- papers/validation.pdf papers/generated)" ]]; then
            git status --short -- papers/validation.pdf papers/generated
            echo "::error::Paper artifacts changed after 'just papers'."
            echo "Run 'just papers' and commit the regenerated PDF/PNG outputs."
            exit 1
          fi
