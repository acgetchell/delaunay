name: Release Benchmarks

# Archive perf-profile Criterion benchmark baselines as durable GitHub Release
# assets used by the performance-regression workflow for current-vs-latest
# released-version comparisons.

permissions:
  contents: write

on:
  release:
    types:
      - published

concurrency:
  group: release-benchmarks-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  UV_VERSION: "0.11.20"

jobs:
  release-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.release.tag_name }}

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          cache: false
          cache-bin: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: false

      - name: Verify uv installation
        run: uv --version

      - name: Generate release benchmark summary
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          trusted_tag_re='^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'
          if [[ ! "$RELEASE_TAG" =~ $trusted_tag_re ]]; then
            echo "❌ Release benchmark assets require a semver tag, got: $RELEASE_TAG" >&2
            exit 1
          fi

          mkdir -p release-benchmark-artifacts
          uv run benchmark-utils generate-summary \
            --run-benchmarks \
            --strict \
            --profile perf \
            --output release-benchmark-artifacts/PERFORMANCE_RESULTS.md
          uv run benchmark-utils write-baseline \
            --ref "$RELEASE_TAG" \
            --output release-benchmark-artifacts/baseline_results.txt

      - name: Package release Criterion baseline
        id: package-baseline
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          if [[ ! -d target/criterion ]]; then
            echo "❌ target/criterion was not generated by the release benchmark run" >&2
            exit 1
          fi

          cp -r target/criterion release-benchmark-artifacts/criterion
          release_commit="$(git rev-parse HEAD)"
          export RELEASE_SHA="$release_commit"
          uv run python - <<'PY'
          import json
          import os
          from datetime import UTC, datetime
          from pathlib import Path

          metadata = {
              "tag": os.environ["RELEASE_TAG"],
              "commit": os.environ["RELEASE_SHA"],
              "run_id": os.environ["RUN_ID"],
              "generated_at": datetime.now(UTC).isoformat(),
              "cargo_profile": "perf",
              "sampling_mode": "full",
              "runner_os": os.environ.get("RUNNER_OS", "unknown"),
              "runner_arch": os.environ.get("RUNNER_ARCH", "unknown"),
              "summary": "PERFORMANCE_RESULTS.md",
              "criterion_dir": "criterion",
          }
          Path("release-benchmark-artifacts/metadata.json").write_text(
              json.dumps(metadata, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

          asset="delaunay-${RELEASE_TAG}-criterion-baseline.tar.gz"
          tar -czf "$asset" -C release-benchmark-artifacts .
          echo "asset=$asset" >> "$GITHUB_OUTPUT"

      - name: Upload temporary release benchmark artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-benchmark-baseline-${{ github.event.release.tag_name }}
          path: ${{ steps.package-baseline.outputs.asset }}
          retention-days: 30
          if-no-files-found: error

      - name: Attach baseline to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_ASSET: ${{ steps.package-baseline.outputs.asset }}
        run: |
          set -euo pipefail

          gh release upload "$RELEASE_TAG" "$RELEASE_ASSET" --clobber

      - name: Release benchmark summary
        env:
          RELEASE_ASSET: ${{ steps.package-baseline.outputs.asset }}
        run: |
          set -euo pipefail

          {
            echo "### Release Benchmark Baseline"
            echo ""
            echo "Uploaded release asset: \`$RELEASE_ASSET\`"
            echo ""
            echo "The archive contains:"
            echo ""
            echo "- \`PERFORMANCE_RESULTS.md\`"
            echo "- \`baseline_results.txt\`"
            echo "- raw Criterion data under \`criterion/\`"
            echo "- \`metadata.json\`"
          } >> "$GITHUB_STEP_SUMMARY"
