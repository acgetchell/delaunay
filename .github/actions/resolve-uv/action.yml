name: Resolve uv version
description: Resolve the pinned uv version from justfile.

outputs:
  version:
    description: Resolved uv version from justfile.
    value: ${{ steps.resolve.outputs.version }}

runs:
  using: composite
  steps:
    - name: Resolve uv version
      id: resolve
      shell: bash
      run: |
        set -euo pipefail

        version="$(grep '^uv_version :=' justfile | cut -d '"' -f 2 || true)"
        if [[ -z "$version" ]]; then
          echo "::error::Could not resolve uv_version from justfile"
          exit 1
        fi

        echo "version=$version" >> "$GITHUB_OUTPUT"
