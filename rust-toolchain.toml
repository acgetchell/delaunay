[toolchain]
# Pin to MSRV as specified in Cargo.toml
channel = "1.97.0"

# Essential repository components. Keep this lean so checkout and CI setup do
# not install IDE-only or cross-target components unless a workflow asks for
# them explicitly.
components = [
    "clippy", # Linting (you use strict pedantic mode)
    "rustfmt", # Code formatting (you use cargo fmt --all)
    "rust-src", # Source code for IDEs and local diagnostics
]

# Keep host toolchain installs small; GitHub workflows install cross targets
# through actions-rust-lang/setup-rust-toolchain when needed.
profile = "minimal"
